cliArgs:
  geometry: false
  planmode: false
  threads: 4
  explore: 5
  limit: '1mb'
  logdir: '..'
  logsize: '100M'
  maxlocations: 1000
  maxvehicles: 200
  override: ['c', 'g', 'l', 't', 'x']
  path: ''
  port: 3000
  router: 'osrm'
  timeout: 180000
  baseurl: '/'
routingServers:
  osrm:
    car:
      host: 'osrm-ontario'
      port: '5000'
