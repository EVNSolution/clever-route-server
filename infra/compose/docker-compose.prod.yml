services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - delivery-api
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  delivery-api:
    build:
      context: ../../apps/delivery-api
      dockerfile: Dockerfile
    image: clever-route-server-delivery-api:local
    depends_on:
      postgres:
        condition: service_healthy
      delivery-api-migrate:
        condition: service_completed_successfully
    env_file:
      - ../env/delivery-api.env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/driver-proof-media:/app/var/driver-proof-media

  delivery-api-migrate:
    build:
      context: ../../apps/delivery-api
      dockerfile: Dockerfile
      target: build
    image: clever-route-server-delivery-api-migrate:local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../env/delivery-api.env
    command: ["npm", "exec", "--", "prisma", "db", "push", "--skip-generate"]
    restart: "no"

  postgres:
    image: postgres:17-bookworm
    env_file:
      - ../env/delivery-api.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/postgres:/var/lib/postgresql/data
      - /srv/clever-route-server/data/postgres-backups:/backups

volumes:
  caddy-data:
  caddy-config:
