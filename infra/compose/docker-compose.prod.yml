name: ${ROUTE_OPS_COMPOSE_PROJECT_NAME:-clever-route}

services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - delivery-api
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  route-ops-web-static:
    image: ${ROUTE_OPS_WEB_STATIC_IMAGE:?ROUTE_OPS_WEB_STATIC_IMAGE is required}
    command:
      - sh
      - -c
      - >-
        set -eu; staging=/route-ops-web/.next;
        rm -rf "$$staging"; mkdir -p "$$staging";
        cp -a /opt/route-ops-web/dist "$$staging/dist";
        cp -a /opt/route-ops-web/public "$$staging/public";
        find "$$staging" -type d -exec chmod 0555 {} +;
        find "$$staging" -type f -exec chmod 0444 {} +;
        rm -rf /route-ops-web/dist /route-ops-web/public;
        mv "$$staging/dist" /route-ops-web/dist;
        mv "$$staging/public" /route-ops-web/public;
        rmdir "$$staging"
    restart: "no"
    volumes:
      - route-ops-web-static:/route-ops-web

  delivery-api:
    image: ${DELIVERY_API_IMAGE:?DELIVERY_API_IMAGE is required}
    depends_on:
      postgres:
        condition: service_healthy
      delivery-api-migrate:
        condition: service_completed_successfully
      route-ops-web-static:
        condition: service_completed_successfully
    env_file:
      - ../env/delivery-api.env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    volumes:
      - route-ops-web-static:/app/external/route-ops-web:ro
      - /srv/clever-route-server/data/driver-proof-media:/app/var/driver-proof-media

  delivery-api-migrate:
    image: ${DELIVERY_API_MIGRATE_IMAGE:?DELIVERY_API_MIGRATE_IMAGE is required}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../env/delivery-api.env
    command: ["npm", "--prefix", "apps/delivery-api", "exec", "--", "prisma", "db", "push", "--schema", "apps/delivery-api/prisma/schema.prisma", "--skip-generate"]
    restart: "no"

  postgres:
    image: postgres:17-bookworm
    env_file:
      - ../env/delivery-api.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/postgres:/var/lib/postgresql/data
      - /srv/clever-route-server/data/postgres-backups:/backups

  osrm-ontario:
    image: ${OSRM_IMAGE:-ghcr.io/project-osrm/osrm-backend:latest}
    command:
      [
        "osrm-routed",
        "--algorithm",
        "mld",
        "--port",
        "5000",
        "/data/ontario-latest.osrm"
      ]
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5000:5000"
    profiles:
      - osrm
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/osrm/ontario:/data:ro

volumes:
  caddy-data:
  caddy-config:
  route-ops-web-static:
    name: ${ROUTE_OPS_WEB_STATIC_VOLUME:?ROUTE_OPS_WEB_STATIC_VOLUME is required}
