name: ${ROUTE_OPS_COMPOSE_PROJECT_NAME:-clever-route}

services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - delivery-api
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  route-ops-web-static:
    image: ${ROUTE_OPS_WEB_STATIC_IMAGE:?ROUTE_OPS_WEB_STATIC_IMAGE is required}
    command:
      - sh
      - -c
      - >-
        set -eu; staging=/route-ops-web/.next;
        rm -rf "$$staging"; mkdir -p "$$staging";
        cp -a /opt/route-ops-web/dist "$$staging/dist";
        cp -a /opt/route-ops-web/public "$$staging/public";
        find "$$staging" -type d -exec chmod 0555 {} +;
        find "$$staging" -type f -exec chmod 0444 {} +;
        rm -rf /route-ops-web/dist /route-ops-web/public;
        mv "$$staging/dist" /route-ops-web/dist;
        mv "$$staging/public" /route-ops-web/public;
        rmdir "$$staging"
    restart: "no"
    volumes:
      - route-ops-web-static:/route-ops-web

  delivery-api:
    image: ${DELIVERY_API_IMAGE:?DELIVERY_API_IMAGE is required}
    depends_on:
      postgres:
        condition: service_healthy
      delivery-api-migrate:
        condition: service_completed_successfully
      route-ops-web-static:
        condition: service_completed_successfully
    env_file:
      - ../env/delivery-api.env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const http=require('node:http');const req=http.get({host:'127.0.0.1',port:Number(process.env.PORT || 3000),path:'/healthz',timeout:2000},res=>{process.exit(res.statusCode===200?0:1);});req.on('timeout',()=>req.destroy(new Error('timeout')));req.on('error',()=>process.exit(1));"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    volumes:
      - route-ops-web-static:/app/external/route-ops-web:ro
      - /srv/clever-route-server/data/driver-proof-media:/app/var/driver-proof-media

  delivery-api-migrate:
    image: ${DELIVERY_API_IMAGE:?DELIVERY_API_IMAGE is required}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../env/delivery-api.env
    environment:
      PRISMA_SCHEMA_SHA: ${PRISMA_SCHEMA_SHA:?PRISMA_SCHEMA_SHA is required}
    command: ["sh", "scripts/guard-prisma-db-push.sh"]
    restart: "no"


  route-engine:
    # Legacy compatibility profile only. Deploy/rollback scripts require an
    # explicit ROUTE_ENGINE_IMAGE before ROUTE_ENGINE_BASE_URL can enable this.
    # The fallback keeps `docker compose config` usable when the profile is off;
    # it is not a route_engine image and must not be used for activation.
    image: ${ROUTE_ENGINE_IMAGE:-alpine:3.20}
    env_file:
      - ../env/delivery-api.env
    environment:
      ROUTE_ENGINE_CACHE_DIR: /cache/route_engine
    expose:
      - "8080"
    profiles:
      - route-engine
    restart: unless-stopped
    volumes:
      - ${ROUTE_ENGINE_GRAPH_HOST_DIR:-/srv/clever-route-server/data/route-engine/parquet}:/app/routing_engine/v7_out/parquet:ro
      - route-engine-cache:/cache/route_engine


  vroom:
    image: ${VROOM_IMAGE:-ghcr.io/vroom-project/vroom-docker@sha256:247d5683d6745c755d718a156d16b16aac80baccc276a003a68b986c13883b08}
    depends_on:
      osrm-ontario:
        condition: service_started
    expose:
      - "3000"
    profiles:
      - vroom
    restart: unless-stopped
    volumes:
      - ../vroom/config.yml:/conf/config.yml:ro

  postgres:
    image: postgres:17-bookworm
    env_file:
      - ../env/delivery-api.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/postgres:/var/lib/postgresql/data
      - /srv/clever-route-server/data/postgres-backups:/backups

  osrm-ontario:
    image: ${OSRM_IMAGE:-ghcr.io/project-osrm/osrm-backend:latest}
    command:
      [
        "osrm-routed",
        "--algorithm",
        "mld",
        "--port",
        "5000",
        "/data/ontario-latest.osrm"
      ]
    expose:
      - "5000"
    ports:
      - "127.0.0.1:5000:5000"
    profiles:
      - osrm
    restart: unless-stopped
    volumes:
      - /srv/clever-route-server/data/osrm/ontario:/data:ro

volumes:
  caddy-data:
  caddy-config:
  route-ops-web-static:
    name: ${ROUTE_OPS_WEB_STATIC_VOLUME:?ROUTE_OPS_WEB_STATIC_VOLUME is required}
  route-engine-cache:
