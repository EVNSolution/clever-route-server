name: Route Ops release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "prepare builds/publishes images and dry-runs; promote deploys an approved prepare manifest"
        required: true
        type: choice
        options:
          - prepare
          - promote
      deployed_base_ref:
        description: "Prepare only: Git SHA/ref currently deployed in production; scope guard compares this ref to HEAD"
        required: false
      allow_compose_image_variable_bootstrap:
        description: "Prepare only: allow the one-time compose image-variable bootstrap change"
        required: false
        type: boolean
        default: false
      allow_geocode_osrm_lane:
        description: "Prepare only: allow reviewed geocoding/OSRM support files in this Route Ops release"
        required: false
        type: boolean
        default: false
      allow_commerce_sync_lane:
        description: "Prepare only: allow reviewed Woo/Shopify sync support files in this Route Ops release"
        required: false
        type: boolean
        default: false
      route_engine_image:
        description: "Prepare only: ghcr.io/evnsolution/route-engine-worker:<40-hex-sha>"
        required: false
      route_engine_image_digest:
        description: "Prepare only: ghcr.io/evnsolution/route-engine-worker@sha256:<64-hex-digest>"
        required: false
      route_engine_publish_evidence_url:
        description: "Prepare only: successful route_engine worker image publish workflow run URL; image revision label and digest are machine-verified"
        required: false
      release_run_id:
        description: "Promote only: successful Route Ops release prepare run id"
        required: false
      release_manifest_sha256:
        description: "Promote only: SHA256 of the immutable release manifest from prepare"
        required: false

permissions:
  contents: read

concurrency:
  group: route-ops-release-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RUNTIME_IMAGE: ghcr.io/evnsolution/clever-route-server-delivery-api
  MIGRATE_IMAGE: ghcr.io/evnsolution/clever-route-server-delivery-api-migrate
  FRONTEND_STATIC_IMAGE: ghcr.io/evnsolution/clever-route-server-route-ops-web-static
  ROUTE_ENGINE_IMAGE_REPO: ghcr.io/evnsolution/route-engine-worker
  ROUTE_OPS_DEPLOY_CONTROL_BUCKET: route-ops-artifacts-902837199612-ap-northeast-2
  ROUTE_OPS_DEPLOY_CONTROL_PREFIX: artifacts/route-ops/prod/deploy-control
  ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID: "902837199612"
  ROUTE_OPS_EXPECTED_AWS_REGION: ap-northeast-2
  RELEASE_MANIFEST_ARTIFACT: route-ops-release-manifest

jobs:
  prepare_validate:
    if: inputs.mode == 'prepare'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      route_engine_tag: ${{ steps.validate_inputs.outputs.route_engine_tag }}
      prepare_run_url: ${{ steps.validate_inputs.outputs.prepare_run_url }}
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Route Ops release prepare is manual-only and must run from refs/heads/main." >&2
          exit 1

      - name: Require actor allowlist
        shell: bash
        env:
          DEPLOY_ALLOWED_ACTORS: ${{ vars.DEPLOY_ALLOWED_ACTORS }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ALLOWED_ACTORS//[[:space:],]/}" ]; then
            echo "DEPLOY_ALLOWED_ACTORS is required and must fail closed before preparing Route Ops release." >&2
            exit 1
          fi
          IFS=',' read -ra actors <<< "$DEPLOY_ALLOWED_ACTORS"
          allowed=false
          for actor in "${actors[@]}"; do
            actor="$(echo "$actor" | xargs)"
            if [ "$actor" = "$GITHUB_ACTOR_NAME" ]; then allowed=true; fi
          done
          if [ "$allowed" != true ]; then
            echo "$GITHUB_ACTOR_NAME is not allowed to prepare Route Ops release." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate prepare inputs
        id: validate_inputs
        shell: bash
        env:
          DEPLOYED_BASE_REF: ${{ inputs.deployed_base_ref }}
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_IMAGE_DIGEST: ${{ inputs.route_engine_image_digest }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ inputs.route_engine_publish_evidence_url }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOYED_BASE_REF" ]; then echo "deployed_base_ref is required for prepare." >&2; exit 1; fi
          if [ "${ROUTE_ENGINE_IMAGE%:*}" != "$ROUTE_ENGINE_IMAGE_REPO" ]; then
            echo "route_engine_image must use exact repository ${ROUTE_ENGINE_IMAGE_REPO}" >&2
            exit 1
          fi
          route_engine_tag="${ROUTE_ENGINE_IMAGE##*:}"
          if ! [[ "$route_engine_tag" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "route_engine_image must be ${ROUTE_ENGINE_IMAGE_REPO}:<40-hex-sha>" >&2
            exit 1
          fi
          expected_digest_prefix="${ROUTE_ENGINE_IMAGE_REPO}@sha256:"
          if [[ "$ROUTE_ENGINE_IMAGE_DIGEST" != "${expected_digest_prefix}"* ]]; then
            echo "route_engine_image_digest must use exact repository ${ROUTE_ENGINE_IMAGE_REPO}@sha256:<64-hex-digest>" >&2
            exit 1
          fi
          route_engine_digest_sha="${ROUTE_ENGINE_IMAGE_DIGEST:${#expected_digest_prefix}}"
          if ! [[ "$route_engine_digest_sha" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "route_engine_image_digest must be ${ROUTE_ENGINE_IMAGE_REPO}@sha256:<64-hex-digest>" >&2
            exit 1
          fi
          if ! [[ "$ROUTE_ENGINE_PUBLISH_EVIDENCE_URL" =~ ^https://github\.com/EVNSolution/route_engine/actions/runs/[0-9]+/?$ ]]; then
            echo "route_engine_publish_evidence_url must be the route_engine worker image publish run URL." >&2
            exit 1
          fi
          echo "route_engine_tag=$route_engine_tag" >> "$GITHUB_OUTPUT"
          echo "prepare_run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Guard ignore hygiene
        run: node scripts/check-ignore-hygiene.mjs

      - name: Install pinned gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Guard secret scans before release prepare
        env:
          SECRET_SCAN_REQUIRE_GITLEAKS: "1"
        run: scripts/scan-secrets.sh --history --worktree

      - name: Guard Route Ops release scope
        shell: bash
        env:
          DEPLOYED_BASE_REF: ${{ inputs.deployed_base_ref }}
          ALLOW_COMPOSE_IMAGE_VARIABLE_BOOTSTRAP: ${{ inputs.allow_compose_image_variable_bootstrap }}
          ALLOW_GEOCODE_OSRM_LANE: ${{ inputs.allow_geocode_osrm_lane }}
          ALLOW_COMMERCE_SYNC_LANE: ${{ inputs.allow_commerce_sync_lane }}
        run: |
          set -euo pipefail
          extra=()
          if [ "$ALLOW_COMPOSE_IMAGE_VARIABLE_BOOTSTRAP" = "true" ]; then
            extra+=(--allow-compose-bootstrap)
          fi
          if [ "$ALLOW_GEOCODE_OSRM_LANE" = "true" ]; then
            extra+=(--allow-geocode-osrm-lane)
          fi
          if [ "$ALLOW_COMMERCE_SYNC_LANE" = "true" ]; then
            extra+=(--allow-commerce-sync-lane)
          fi
          scripts/guard-route-ops-deploy-scope.mjs --base "$DEPLOYED_BASE_REF" --head "$GITHUB_SHA" --json "${extra[@]}"

  prepare_publish:
    if: inputs.mode == 'prepare'
    needs: prepare_validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      prisma_schema_sha: ${{ steps.meta.outputs.schema_sha }}
      route_ops_web_static_sha: ${{ steps.web_static.outputs.static_sha }}
      delivery_api_image: ${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }}
      delivery_api_migrate_image: ${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }}
      route_ops_web_static_image: ${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build Route Ops web static artifact metadata
        id: web_static
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/route-ops-web ci
          npm --prefix apps/route-ops-web run build
          test -f apps/route-ops-web/dist/.vite/manifest.json
          test -d apps/route-ops-web/dist/assets
          test -d apps/route-ops-web/public/vendor
          static_sha="$(tar -C apps/route-ops-web --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf - dist public | sha256sum | awk '{print $1}')"
          echo "static_sha=${static_sha}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          schema_sha="$(sha256sum apps/delivery-api/prisma/schema.prisma | awk '{print $1}')"
          echo "schema_sha=${schema_sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        # docker/login-action v4.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.1.0 (Node 24) pinned to full commit SHA.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push Route Ops web static image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/route-ops-web/Dockerfile
          target: static
          push: true
          tags: ${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.route-ops-web-static-sha=${{ steps.web_static.outputs.static_sha }}
            org.clever-route.image-role=route-ops-web-static

      - name: Build and push runtime image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/delivery-api/Dockerfile
          target: runtime
          push: true
          tags: ${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.prisma-schema-sha=${{ steps.meta.outputs.schema_sha }}
            org.clever-route.image-role=runtime

      - name: Build and push migrate image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/delivery-api/Dockerfile
          target: migrate
          push: true
          tags: ${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.prisma-schema-sha=${{ steps.meta.outputs.schema_sha }}
            org.clever-route.image-role=migrate

  prepare_dry_run:
    if: inputs.mode == 'prepare'
    needs:
      - prepare_validate
      - prepare_publish
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
      id-token: write
    outputs:
      release_manifest_sha256: ${{ steps.release_manifest.outputs.manifest_sha256 }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Checkout deploy-control source at image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare_publish.outputs.image_tag }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git cat-file -e "${IMAGE_TAG}^{commit}"
          git merge-base --is-ancestor "$IMAGE_TAG" origin/main
          git checkout --detach "$IMAGE_TAG"

      - name: Log in to GHCR for route_engine image verification
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4.2.0 (Node 24) pinned to full commit SHA.
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.ROUTE_ENGINE_GHCR_READ_USERNAME || github.actor }}
          password: ${{ secrets.ROUTE_ENGINE_GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Verify route_engine worker image revision label
        id: route_engine_image
        shell: bash
        env:
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_IMAGE_DIGEST: ${{ inputs.route_engine_image_digest }}
        run: |
          set -euo pipefail
          route_engine_tag="${ROUTE_ENGINE_IMAGE##*:}"
          docker pull "$ROUTE_ENGINE_IMAGE"
          revision="$(docker image inspect "$ROUTE_ENGINE_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ -z "$revision" ]; then echo "route_engine image must include org.opencontainers.image.revision label." >&2; exit 1; fi
          if [ "$revision" != "$route_engine_tag" ]; then echo "route_engine image revision label must match tag; revision=$revision tag=$route_engine_tag" >&2; exit 1; fi
          repo_digests="$(docker image inspect "$ROUTE_ENGINE_IMAGE" --format '{{ json .RepoDigests }}')"
          if ! python3 - "$ROUTE_ENGINE_IMAGE_DIGEST" "$repo_digests" <<'PY'
          import json
          import sys
          expected, raw = sys.argv[1:3]
          digests = json.loads(raw)
          if expected not in digests:
              print(f'route_engine image digest mismatch; expected {expected}; got {digests}', file=sys.stderr)
              sys.exit(1)
          PY
          then
            exit 1
          fi
          echo "route_engine_image_revision=$revision" >> "$GITHUB_OUTPUT"
          echo "route_engine_image_digest=$ROUTE_ENGINE_IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Prepare dry-run deploy-control files
        id: source_sync
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare_publish.outputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ needs.prepare_publish.outputs.prisma_schema_sha }}
          DELIVERY_API_IMAGE: ${{ needs.prepare_publish.outputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ needs.prepare_publish.outputs.delivery_api_migrate_image }}
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ inputs.route_engine_publish_evidence_url }}
          PUBLISH_EVIDENCE_URL: ${{ needs.prepare_validate.outputs.prepare_run_url }}
          DRY_RUN: "true"
          DEPLOY_CONTROL_BUCKET: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_BUCKET }}
          DEPLOY_CONTROL_PREFIX: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_PREFIX }}
          DRIVER_APP_DOWNLOAD_URL: ${{ secrets.DRIVER_APP_DOWNLOAD_URL }}
        run: |
          set -euo pipefail
          deploy_control_files=()
          while IFS= read -r file; do deploy_control_files+=("$file"); done < <(scripts/route-ops-deploy-control-bundle.sh bundle-files)
          for file in "${deploy_control_files[@]}"; do scripts/route-ops-deploy-control-bundle.sh validate-source-file "$file"; done
          bundle_name="route-ops-deploy-control.tar.gz"
          s3_key="${DEPLOY_CONTROL_PREFIX}/${GITHUB_RUN_ID}/${IMAGE_TAG}/${bundle_name}"
          s3_uri="s3://${DEPLOY_CONTROL_BUCKET}/${s3_key}"
          staging_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/route-ops-release-dry-run.XXXXXX")"
          cleanup() { rm -rf "$staging_dir"; }
          trap cleanup EXIT
          for file in "${deploy_control_files[@]}"; do
            mkdir -p "$staging_dir/$(dirname "$file")"
            cp -p "$file" "$staging_dir/$file"
          done
          python3 - \
            "$IMAGE_TAG" "$PRISMA_SCHEMA_SHA" "$DELIVERY_API_IMAGE" "$DELIVERY_API_MIGRATE_IMAGE" \
            "$ROUTE_ENGINE_IMAGE" "$ROUTE_ENGINE_PUBLISH_EVIDENCE_URL" "$PUBLISH_EVIDENCE_URL" "$DRY_RUN" \
            "$GITHUB_RUN_ID" "$DEPLOY_CONTROL_BUCKET" "$DEPLOY_CONTROL_PREFIX" "$bundle_name" "$s3_uri" \
            "${deploy_control_files[@]}" <<'PY' > "$staging_dir/deploy-control-manifest.json"
          import json
          import sys
          (
              image_tag, schema_sha, runtime_image, migrate_image, route_engine_image,
              route_engine_publish_evidence_url, publish_evidence_url, dry_run, github_run_id,
              artifact_bucket, artifact_prefix, bundle_file, s3_uri, *deploy_control_files,
          ) = sys.argv[1:]
          print(json.dumps({
              'schemaVersion': 1,
              'dryRun': dry_run == 'true',
              'runId': github_run_id,
              'commitSha': image_tag,
              'imageTag': image_tag,
              'prismaSchemaSha': schema_sha,
              'deliveryApiImage': runtime_image,
              'deliveryApiMigrateImage': migrate_image,
              'routeEngineImage': route_engine_image,
              'routeEnginePublishEvidenceUrl': route_engine_publish_evidence_url,
              'publishEvidenceUrl': publish_evidence_url,
              'artifactBucket': artifact_bucket,
              'artifactPrefix': artifact_prefix,
              'bundleFile': bundle_file,
              's3Uri': s3_uri,
              'deployControlFiles': deploy_control_files,
          }, sort_keys=True, separators=(',', ':')))
          PY
          bundle_path="${RUNNER_TEMP:-/tmp}/route-ops-deploy-control-${GITHUB_RUN_ID}.tar.gz"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -C "$staging_dir" -czf "$bundle_path" deploy-control-manifest.json "${deploy_control_files[@]}"
          scripts/route-ops-deploy-control-bundle.sh validate-tar-manifest "$bundle_path"
          bundle_size="$(wc -c < "$bundle_path" | tr -d ' ')"
          bundle_sha="$(sha256sum "$bundle_path" | awk '{print $1}')"
          python3 - "$s3_uri" "$bundle_sha" <<'PY' > /tmp/route-ops-deploy-parameters.json
          import json
          import os
          import sys
          from urllib.parse import urlparse
          s3_uri, bundle_sha = sys.argv[1:3]
          driver_app_download_url = os.environ.get('DRIVER_APP_DOWNLOAD_URL', '').strip()
          if not driver_app_download_url:
              print('DRIVER_APP_DOWNLOAD_URL repository secret is required for Route Ops dry-run.', file=sys.stderr)
              sys.exit(1)
          parsed = urlparse(driver_app_download_url)
          if parsed.scheme not in {'http', 'https'} or not parsed.netloc:
              print('DRIVER_APP_DOWNLOAD_URL must be an http(s) URL', file=sys.stderr)
              sys.exit(1)
          params = {
              'DeployControlBundleS3Uri': [s3_uri],
              'DeployControlBundleSha256': [bundle_sha],
              'DriverAppDownloadUrl': [driver_app_download_url],
          }
          print(json.dumps(params, sort_keys=True))
          PY
          {
            echo "bundle_path=${bundle_path}"
            echo "bundle_sha=${bundle_sha}"
            echo "bundle_size=${bundle_size}"
            echo "s3_uri=${s3_uri}"
            echo "s3_key=${s3_key}"
          } >> "$GITHUB_OUTPUT"
          echo "Route Ops release dry-run bundle bytes=${bundle_size}"
          echo "Route Ops release dry-run expectedSha256=${bundle_sha}"
          echo "Route Ops release dry-run ssmParameterChars DeployControlBundleS3Uri=${#s3_uri} DeployControlBundleSha256=${#bundle_sha} DriverAppDownloadUrl=<redacted>"

      - name: Validate AWS/SSM variable configuration
        shell: bash
        env:
          AWS_ROUTE_OPS_DEPLOY_ROLE_ARN: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          for name in AWS_ROUTE_OPS_DEPLOY_ROLE_ARN AWS_REGION SSM_ROUTE_OPS_TARGET_TAG_KEY SSM_ROUTE_OPS_TARGET_TAG_VALUE SSM_ROUTE_OPS_DOCUMENT_NAME SSM_ROUTE_OPS_DOCUMENT_VERSION; do
            value="${!name}"
            if [ -z "${value//[[:space:]]/}" ]; then echo "$name is required for Route Ops release SSM execution." >&2; exit 1; fi
          done
          if [ "$SSM_ROUTE_OPS_DOCUMENT_NAME" = "AWS-RunShellScript" ]; then echo "AWS-RunShellScript is not allowed for Route Ops release deploy." >&2; exit 1; fi
          if ! [[ "$SSM_ROUTE_OPS_DOCUMENT_VERSION" =~ ^[0-9]+$ ]]; then echo "SSM_ROUTE_OPS_DOCUMENT_VERSION must be a pinned numeric reviewed version." >&2; exit 1; fi

      - name: Configure AWS credentials through OIDC
        # aws-actions/configure-aws-credentials v6.2.0 (Node 24) pinned to full commit SHA.
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy-control artifact bucket
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$account_id" != "$ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID" ]; then echo "Route Ops deploy account mismatch." >&2; exit 1; fi
          if [ "$AWS_REGION" != "$ROUTE_OPS_EXPECTED_AWS_REGION" ]; then echo "Route Ops deploy region mismatch." >&2; exit 1; fi
          expected_bucket="route-ops-artifacts-${account_id}-${AWS_REGION}"
          if [ "$ROUTE_OPS_DEPLOY_CONTROL_BUCKET" != "$expected_bucket" ]; then echo "Route Ops deploy-control bucket must be ${expected_bucket}." >&2; exit 1; fi
          if [ "$ROUTE_OPS_DEPLOY_CONTROL_PREFIX" != "artifacts/route-ops/prod/deploy-control" ]; then echo "Route Ops deploy-control prefix mismatch." >&2; exit 1; fi

      - name: Upload dry-run deploy-control bundle artifact
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.source_sync.outputs.bundle_path }}
          BUNDLE_SHA: ${{ steps.source_sync.outputs.bundle_sha }}
          BUNDLE_SIZE: ${{ steps.source_sync.outputs.bundle_size }}
          S3_URI: ${{ steps.source_sync.outputs.s3_uri }}
        run: |
          set -euo pipefail
          actual_sha="$(sha256sum "$BUNDLE_PATH" | awk '{print $1}')"
          actual_size="$(wc -c < "$BUNDLE_PATH" | tr -d ' ')"
          if [ "$actual_sha" != "$BUNDLE_SHA" ] || [ "$actual_size" != "$BUNDLE_SIZE" ]; then
            echo "Route Ops dry-run bundle changed before upload." >&2
            exit 1
          fi
          aws s3 cp "$BUNDLE_PATH" "$S3_URI" --sse AES256 --no-progress
          echo "Route Ops release dry-run bundle uploaded to ${S3_URI}"

      - name: Verify SSM target resolves to one online managed node
        id: target
        shell: bash
        env:
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
        run: |
          set -euo pipefail
          filter="Key=tag:${SSM_ROUTE_OPS_TARGET_TAG_KEY},Values=${SSM_ROUTE_OPS_TARGET_TAG_VALUE}"
          target_query="[length(InstanceInformationList), InstanceInformationList[0].InstanceId, InstanceInformationList[0].PingStatus, InstanceInformationList[0].AgentVersion]"
          read -r total_count instance_id ping_status agent_version <<< "$(aws ssm describe-instance-information --filters "$filter" --query "$target_query" --output text)"
          if [ "$total_count" != "1" ]; then echo "Route Ops SSM target tag must resolve to exactly one managed node; got $total_count." >&2; exit 1; fi
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then echo "Route Ops SSM target instance id is missing." >&2; exit 1; fi
          if [ "$ping_status" != "Online" ]; then echo "Route Ops SSM target must be Online; got $ping_status." >&2; exit 1; fi
          python3 - "$agent_version" <<'PY'
          import sys
          version = sys.argv[1]
          minimum = (3, 3, 2746, 0)
          parsed = tuple(int(part) for part in version.split('.'))
          parsed = parsed + (0,) * (len(minimum) - len(parsed))
          if parsed < minimum:
              print(f'SSM AgentVersion {version} must be >= 3.3.2746.0.', file=sys.stderr)
              sys.exit(1)
          PY
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"

      - name: Send custom SSM dry-run command
        id: command
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare_publish.outputs.image_tag }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          test -f /tmp/route-ops-deploy-parameters.json
          read -r command_id target_count <<< "$(aws ssm send-command \
            --document-name "$SSM_ROUTE_OPS_DOCUMENT_NAME" \
            --document-version "$SSM_ROUTE_OPS_DOCUMENT_VERSION" \
            --instance-ids "$INSTANCE_ID" \
            --parameters file:///tmp/route-ops-deploy-parameters.json \
            --max-concurrency "1" \
            --max-errors "0" \
            --comment "RouteOps release prepare dryRun=true ${IMAGE_TAG:0:12} run ${GITHUB_RUN_ID}" \
            --query 'Command.[CommandId,TargetCount]' \
            --output text)"
          if [ "$target_count" != "1" ]; then echo "Route Ops SSM SendCommand TargetCount must be 1; got $target_count." >&2; exit 1; fi
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"

      - name: Poll SSM dry-run command status
        id: poll
        shell: bash
        env:
          COMMAND_ID: ${{ steps.command.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          terminal='^(Success|Cancelled|TimedOut|Failed|Cancelling)$'
          status="Pending"
          for _ in {1..720}; do
            status="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)"
            if [[ "$status" =~ $terminal ]]; then break; fi
            sleep 10
          done
          summary="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' --output json)"
          echo "$summary"
          SUMMARY_JSON="$summary" python3 - <<'PY'
          import json
          import os
          import sys
          summary = json.loads(os.environ['SUMMARY_JSON'])
          if summary.get('Status') != 'Success' or summary.get('ResponseCode') != 0:
              print(f"Route Ops SSM dry-run did not succeed: {summary}", file=sys.stderr)
              sys.exit(1)
          stdout = summary.get('StandardOutputContent') or ''
          if 'Route Ops deploy-control manifest validation result=passed dryRun=true' not in stdout:
              print('Route Ops SSM dry-run output is missing manifest validation proof.', file=sys.stderr)
              sys.exit(1)
          if 'no production files synced and no deploy script executed' not in stdout:
              print('Route Ops SSM dry-run output is missing no-mutation proof.', file=sys.stderr)
              sys.exit(1)
          PY
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" != "Success" ]; then echo "Route Ops SSM dry-run command did not succeed: $status" >&2; exit 1; fi

      - name: Create immutable release manifest
        id: release_manifest
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.prepare_publish.outputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ needs.prepare_publish.outputs.prisma_schema_sha }}
          ROUTE_OPS_WEB_STATIC_SHA: ${{ needs.prepare_publish.outputs.route_ops_web_static_sha }}
          DELIVERY_API_IMAGE: ${{ needs.prepare_publish.outputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ needs.prepare_publish.outputs.delivery_api_migrate_image }}
          ROUTE_OPS_WEB_STATIC_IMAGE: ${{ needs.prepare_publish.outputs.route_ops_web_static_image }}
          PREPARE_RUN_URL: ${{ needs.prepare_validate.outputs.prepare_run_url }}
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_IMAGE_DIGEST: ${{ steps.route_engine_image.outputs.route_engine_image_digest }}
          ROUTE_ENGINE_IMAGE_REVISION: ${{ steps.route_engine_image.outputs.route_engine_image_revision }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ inputs.route_engine_publish_evidence_url }}
          BUNDLE_S3_URI: ${{ steps.source_sync.outputs.s3_uri }}
          BUNDLE_SHA: ${{ steps.source_sync.outputs.bundle_sha }}
          DRY_RUN_COMMAND_ID: ${{ steps.command.outputs.command_id }}
          DRY_RUN_STATUS: ${{ steps.poll.outputs.status }}
          DEPLOYED_BASE_REF: ${{ inputs.deployed_base_ref }}
          DRIVER_APP_DOWNLOAD_URL: ${{ secrets.DRIVER_APP_DOWNLOAD_URL }}
          ALLOW_COMPOSE: ${{ inputs.allow_compose_image_variable_bootstrap }}
          ALLOW_GEOCODE: ${{ inputs.allow_geocode_osrm_lane }}
          ALLOW_COMMERCE: ${{ inputs.allow_commerce_sync_lane }}
        run: |
          set -euo pipefail
          mkdir -p release-manifest
          node - <<'NODE' > release-manifest/release-manifest.unstamped.json
          const manifest = {
            schemaVersion: 1,
            mode: 'prepare',
            workflowName: 'Route Ops release',
            workflowPath: '.github/workflows/route-ops-release.yml',
            releaseRunId: process.env.GITHUB_RUN_ID,
            releaseRunAttempt: process.env.GITHUB_RUN_ATTEMPT,
            artifactName: process.env.RELEASE_MANIFEST_ARTIFACT,
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            headSha: process.env.GITHUB_SHA,
            actor: process.env.GITHUB_ACTOR,
            createdAt: new Date().toISOString(),
            deployedBaseRef: process.env.DEPLOYED_BASE_REF,
            allowComposeImageVariableBootstrap: process.env.ALLOW_COMPOSE === 'true',
            allowGeocodeOsrmLane: process.env.ALLOW_GEOCODE === 'true',
            allowCommerceSyncLane: process.env.ALLOW_COMMERCE === 'true',
            imageTag: process.env.IMAGE_TAG,
            commitSha: process.env.IMAGE_TAG,
            prismaSchemaSha: process.env.PRISMA_SCHEMA_SHA,
            routeOpsWebStaticSha: process.env.ROUTE_OPS_WEB_STATIC_SHA,
            deliveryApiImage: process.env.DELIVERY_API_IMAGE,
            deliveryApiMigrateImage: process.env.DELIVERY_API_MIGRATE_IMAGE,
            routeOpsWebStaticImage: process.env.ROUTE_OPS_WEB_STATIC_IMAGE,
            prepareRunUrl: process.env.PREPARE_RUN_URL,
            publishEvidenceUrl: process.env.PREPARE_RUN_URL,
            publishEvidenceContract: 'self-prepare-run-builds-route-ops-images',
            routeEngineImage: process.env.ROUTE_ENGINE_IMAGE,
            routeEngineImageDigest: process.env.ROUTE_ENGINE_IMAGE_DIGEST,
            routeEngineImageRevision: process.env.ROUTE_ENGINE_IMAGE_REVISION,
            routeEnginePublishEvidenceUrl: process.env.ROUTE_ENGINE_PUBLISH_EVIDENCE_URL,
            routeEngineEvidenceContract: 'image-revision-label-digest-and-audit-url',
            dryRunDeployControlBundleS3Uri: process.env.BUNDLE_S3_URI,
            dryRunDeployControlBundleSha256: process.env.BUNDLE_SHA,
            dryRunSsmCommandId: process.env.DRY_RUN_COMMAND_ID,
            dryRunStatus: process.env.DRY_RUN_STATUS,
            dryRunEvidenceSummary: { mutation: 'none', redacted: true },
            driverAppDownloadUrlPresent: Boolean((process.env.DRIVER_APP_DOWNLOAD_URL || '').trim()),
          };
          console.log(JSON.stringify(manifest));
          NODE
          scripts/route-ops-release-manifest.mjs stamp release-manifest/release-manifest.unstamped.json --output release-manifest/release-manifest.json
          scripts/route-ops-release-manifest.mjs validate release-manifest/release-manifest.json
          manifest_sha="$(scripts/route-ops-release-manifest.mjs digest release-manifest/release-manifest.json)"
          echo "$manifest_sha" > release-manifest/release-manifest.sha256
          echo "manifest_sha256=${manifest_sha}" >> "$GITHUB_OUTPUT"
          cat > route-ops-release-prepare-summary.md <<SUMMARY
          # Route Ops release prepare summary

          Image tag: \`${IMAGE_TAG}\`
          Prisma schema SHA: \`${PRISMA_SCHEMA_SHA}\`
          Route Ops web static SHA: \`${ROUTE_OPS_WEB_STATIC_SHA}\`
          Release run id: \`${GITHUB_RUN_ID}\`
          Release manifest SHA256: \`${manifest_sha}\`
          Dry-run SSM command: \`${DRY_RUN_COMMAND_ID}\`
          Dry-run status: \`${DRY_RUN_STATUS}\`
          Dry-run bundle: \`${BUNDLE_S3_URI}\`
          Dry-run bundle SHA256: \`${BUNDLE_SHA}\`

          Promote only after reviewing this dry-run summary:

          \`\`\`bash
          gh workflow run route-ops-release.yml --ref main -f mode=promote -f release_run_id=${GITHUB_RUN_ID} -f release_manifest_sha256=${manifest_sha}
          \`\`\`

          Driver app download URL was present: \`${DRIVER_APP_DOWNLOAD_URL:+true}\`
          Raw driver app URL is intentionally not written to this summary or manifest.
          SUMMARY
          cat route-ops-release-prepare-summary.md

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.RELEASE_MANIFEST_ARTIFACT }}
          path: |
            release-manifest/release-manifest.json
            release-manifest/release-manifest.sha256
            route-ops-release-prepare-summary.md
          retention-days: 14

  promote_validate:
    if: inputs.mode == 'promote'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    outputs:
      manifest_path: ${{ steps.validate_manifest.outputs.manifest_path }}
      image_tag: ${{ steps.validate_manifest.outputs.image_tag }}
      prisma_schema_sha: ${{ steps.validate_manifest.outputs.prisma_schema_sha }}
      delivery_api_image: ${{ steps.validate_manifest.outputs.delivery_api_image }}
      delivery_api_migrate_image: ${{ steps.validate_manifest.outputs.delivery_api_migrate_image }}
      route_engine_image: ${{ steps.validate_manifest.outputs.route_engine_image }}
      route_engine_image_digest: ${{ steps.validate_manifest.outputs.route_engine_image_digest }}
      route_engine_image_revision: ${{ steps.validate_manifest.outputs.route_engine_image_revision }}
      route_engine_publish_evidence_url: ${{ steps.validate_manifest.outputs.route_engine_publish_evidence_url }}
      publish_evidence_url: ${{ steps.validate_manifest.outputs.publish_evidence_url }}
      commit_sha: ${{ steps.validate_manifest.outputs.commit_sha }}
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Route Ops release promote is manual-only and must run from refs/heads/main." >&2
          exit 1

      - name: Require actor allowlist
        shell: bash
        env:
          DEPLOY_ALLOWED_ACTORS: ${{ vars.DEPLOY_ALLOWED_ACTORS }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ALLOWED_ACTORS//[[:space:],]/}" ]; then
            echo "DEPLOY_ALLOWED_ACTORS is required and must fail closed before promoting Route Ops release." >&2
            exit 1
          fi
          IFS=',' read -ra actors <<< "$DEPLOY_ALLOWED_ACTORS"
          allowed=false
          for actor in "${actors[@]}"; do actor="$(echo "$actor" | xargs)"; if [ "$actor" = "$GITHUB_ACTOR_NAME" ]; then allowed=true; fi; done
          if [ "$allowed" != true ]; then echo "$GITHUB_ACTOR_NAME is not allowed to promote Route Ops release." >&2; exit 1; fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download prepare manifest artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_RUN_ID: ${{ inputs.release_run_id }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_RUN_ID" =~ ^[0-9]+$ ]]; then echo "release_run_id must be numeric." >&2; exit 1; fi
          manifest_dir="$RUNNER_TEMP/release-manifest"
          mkdir -p "$manifest_dir"
          gh run download "$RELEASE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$RELEASE_MANIFEST_ARTIFACT" --dir "$manifest_dir"
          manifest_path="$(find "$manifest_dir" -name release-manifest.json -type f | sort | head -1)"
          if [ -z "$manifest_path" ]; then
            echo "release manifest artifact did not contain release-manifest.json" >&2
            find "$manifest_dir" -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"

      - name: Validate prepare manifest and provenance
        id: validate_manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_RUN_ID: ${{ inputs.release_run_id }}
          EXPECTED_MANIFEST_SHA: ${{ inputs.release_manifest_sha256 }}
        run: |
          set -euo pipefail
          if ! [[ "$EXPECTED_MANIFEST_SHA" =~ ^[0-9a-fA-F]{64}$ ]]; then echo "release_manifest_sha256 must be 64 hex chars." >&2; exit 1; fi
          manifest_path="${{ steps.prepare_manifest.outputs.manifest_path }}"
          if [ -z "$manifest_path" ] || [ ! -f "$manifest_path" ]; then echo "validated manifest path is missing." >&2; exit 1; fi
          scripts/route-ops-release-manifest.mjs validate "$manifest_path" --expect-sha "$EXPECTED_MANIFEST_SHA"
          run_json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RELEASE_RUN_ID}")"
          RUN_JSON="$run_json" MANIFEST_PATH="$manifest_path" EXPECTED_MANIFEST_SHA="$EXPECTED_MANIFEST_SHA" node - <<'NODE'
          const fs = require('node:fs');
          const run = JSON.parse(process.env.RUN_JSON);
          const manifest = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, 'utf8'));
          const fail = (message) => { console.error(message); process.exit(1); };
          if (String(run.id) !== String(manifest.releaseRunId)) fail('prepare run id mismatch');
          if (run.path !== '.github/workflows/route-ops-release.yml') fail(`prepare workflow path mismatch: ${run.path}`);
          if (run.event !== 'workflow_dispatch') fail(`prepare event mismatch: ${run.event}`);
          if (run.conclusion !== 'success') fail(`prepare run conclusion must be success, got ${run.conclusion}`);
          if (run.head_branch !== 'main') fail(`prepare head_branch must be main, got ${run.head_branch}`);
          if (run.head_sha !== manifest.headSha) fail('prepare run head_sha mismatch');
          if (manifest.prepareRunUrl !== manifest.publishEvidenceUrl) fail('publishEvidenceUrl must equal prepareRunUrl');
          if (!manifest.prepareRunUrl.endsWith(`/actions/runs/${run.id}`)) fail('prepareRunUrl does not identify prepare run');
          if (manifest.artifactName !== process.env.RELEASE_MANIFEST_ARTIFACT) fail('unexpected manifest artifact name');
          NODE
          image_tag="$(node -e "const m=require(process.argv[1]); console.log(m.imageTag)" "$manifest_path")"
          git fetch --no-tags origin main
          git cat-file -e "${image_tag}^{commit}"
          git merge-base --is-ancestor "$image_tag" origin/main
          {
            echo "manifest_path=$manifest_path"
            echo "image_tag=$(node -e "const m=require(process.argv[1]); console.log(m.imageTag)" "$manifest_path")"
            echo "commit_sha=$(node -e "const m=require(process.argv[1]); console.log(m.commitSha)" "$manifest_path")"
            echo "prisma_schema_sha=$(node -e "const m=require(process.argv[1]); console.log(m.prismaSchemaSha)" "$manifest_path")"
            echo "delivery_api_image=$(node -e "const m=require(process.argv[1]); console.log(m.deliveryApiImage)" "$manifest_path")"
            echo "delivery_api_migrate_image=$(node -e "const m=require(process.argv[1]); console.log(m.deliveryApiMigrateImage)" "$manifest_path")"
            echo "route_engine_image=$(node -e "const m=require(process.argv[1]); console.log(m.routeEngineImage)" "$manifest_path")"
            echo "route_engine_image_digest=$(node -e "const m=require(process.argv[1]); console.log(m.routeEngineImageDigest)" "$manifest_path")"
            echo "route_engine_image_revision=$(node -e "const m=require(process.argv[1]); console.log(m.routeEngineImageRevision)" "$manifest_path")"
            echo "route_engine_publish_evidence_url=$(node -e "const m=require(process.argv[1]); console.log(m.routeEnginePublishEvidenceUrl)" "$manifest_path")"
            echo "publish_evidence_url=$(node -e "const m=require(process.argv[1]); console.log(m.publishEvidenceUrl)" "$manifest_path")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload validated promote manifest copy
        uses: actions/upload-artifact@v7
        with:
          name: route-ops-promote-validated-manifest
          path: ${{ steps.validate_manifest.outputs.manifest_path }}
          retention-days: 14

  promote_deploy:
    if: inputs.mode == 'promote'
    needs: promote_validate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout exact release commit
        shell: bash
        env:
          COMMIT_SHA: ${{ needs.promote_validate.outputs.commit_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git cat-file -e "${COMMIT_SHA}^{commit}"
          git merge-base --is-ancestor "$COMMIT_SHA" origin/main
          git checkout --detach "$COMMIT_SHA"

      - name: Log in to GHCR for route_engine image verification
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # docker/login-action v4.2.0 (Node 24) pinned to full commit SHA.
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.ROUTE_ENGINE_GHCR_READ_USERNAME || github.actor }}
          password: ${{ secrets.ROUTE_ENGINE_GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Verify route_engine worker image revision label
        shell: bash
        env:
          ROUTE_ENGINE_IMAGE: ${{ needs.promote_validate.outputs.route_engine_image }}
          ROUTE_ENGINE_IMAGE_DIGEST: ${{ needs.promote_validate.outputs.route_engine_image_digest }}
          ROUTE_ENGINE_IMAGE_REVISION: ${{ needs.promote_validate.outputs.route_engine_image_revision }}
        run: |
          set -euo pipefail
          route_engine_tag="${ROUTE_ENGINE_IMAGE##*:}"
          docker pull "$ROUTE_ENGINE_IMAGE"
          revision="$(docker image inspect "$ROUTE_ENGINE_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          if [ -z "$revision" ]; then echo "route_engine image must include org.opencontainers.image.revision label." >&2; exit 1; fi
          if [ "$revision" != "$route_engine_tag" ] || [ "$revision" != "$ROUTE_ENGINE_IMAGE_REVISION" ]; then echo "route_engine image revision label must match manifest and tag; revision=$revision manifest=$ROUTE_ENGINE_IMAGE_REVISION tag=$route_engine_tag" >&2; exit 1; fi
          repo_digests="$(docker image inspect "$ROUTE_ENGINE_IMAGE" --format '{{ json .RepoDigests }}')"
          if ! python3 - "$ROUTE_ENGINE_IMAGE_DIGEST" "$repo_digests" <<'PY'
          import json
          import sys
          expected, raw = sys.argv[1:3]
          digests = json.loads(raw)
          if expected not in digests:
              print(f'route_engine image digest mismatch; expected {expected}; got {digests}', file=sys.stderr)
              sys.exit(1)
          PY
          then
            exit 1
          fi

      - name: Prepare promote deploy-control files
        id: source_sync
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.promote_validate.outputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ needs.promote_validate.outputs.prisma_schema_sha }}
          DELIVERY_API_IMAGE: ${{ needs.promote_validate.outputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ needs.promote_validate.outputs.delivery_api_migrate_image }}
          ROUTE_ENGINE_IMAGE: ${{ needs.promote_validate.outputs.route_engine_image }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ needs.promote_validate.outputs.route_engine_publish_evidence_url }}
          PUBLISH_EVIDENCE_URL: ${{ needs.promote_validate.outputs.publish_evidence_url }}
          DRY_RUN: "false"
          DEPLOY_CONTROL_BUCKET: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_BUCKET }}
          DEPLOY_CONTROL_PREFIX: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_PREFIX }}
          DRIVER_APP_DOWNLOAD_URL: ${{ secrets.DRIVER_APP_DOWNLOAD_URL }}
        run: |
          set -euo pipefail
          deploy_control_files=()
          while IFS= read -r file; do deploy_control_files+=("$file"); done < <(scripts/route-ops-deploy-control-bundle.sh bundle-files)
          for file in "${deploy_control_files[@]}"; do scripts/route-ops-deploy-control-bundle.sh validate-source-file "$file"; done
          bundle_name="route-ops-deploy-control.tar.gz"
          s3_key="${DEPLOY_CONTROL_PREFIX}/${GITHUB_RUN_ID}/${IMAGE_TAG}/${bundle_name}"
          s3_uri="s3://${DEPLOY_CONTROL_BUCKET}/${s3_key}"
          staging_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/route-ops-release-promote.XXXXXX")"
          cleanup() { rm -rf "$staging_dir"; }
          trap cleanup EXIT
          for file in "${deploy_control_files[@]}"; do mkdir -p "$staging_dir/$(dirname "$file")"; cp -p "$file" "$staging_dir/$file"; done
          python3 - \
            "$IMAGE_TAG" "$PRISMA_SCHEMA_SHA" "$DELIVERY_API_IMAGE" "$DELIVERY_API_MIGRATE_IMAGE" \
            "$ROUTE_ENGINE_IMAGE" "$ROUTE_ENGINE_PUBLISH_EVIDENCE_URL" "$PUBLISH_EVIDENCE_URL" "$DRY_RUN" \
            "$GITHUB_RUN_ID" "$DEPLOY_CONTROL_BUCKET" "$DEPLOY_CONTROL_PREFIX" "$bundle_name" "$s3_uri" \
            "${deploy_control_files[@]}" <<'PY' > "$staging_dir/deploy-control-manifest.json"
          import json
          import sys
          (
              image_tag, schema_sha, runtime_image, migrate_image, route_engine_image,
              route_engine_publish_evidence_url, publish_evidence_url, dry_run, github_run_id,
              artifact_bucket, artifact_prefix, bundle_file, s3_uri, *deploy_control_files,
          ) = sys.argv[1:]
          print(json.dumps({
              'schemaVersion': 1,
              'dryRun': dry_run == 'true',
              'runId': github_run_id,
              'commitSha': image_tag,
              'imageTag': image_tag,
              'prismaSchemaSha': schema_sha,
              'deliveryApiImage': runtime_image,
              'deliveryApiMigrateImage': migrate_image,
              'routeEngineImage': route_engine_image,
              'routeEnginePublishEvidenceUrl': route_engine_publish_evidence_url,
              'publishEvidenceUrl': publish_evidence_url,
              'artifactBucket': artifact_bucket,
              'artifactPrefix': artifact_prefix,
              'bundleFile': bundle_file,
              's3Uri': s3_uri,
              'deployControlFiles': deploy_control_files,
          }, sort_keys=True, separators=(',', ':')))
          PY
          python3 - "$staging_dir/deploy-control-manifest.json" <<'PY'
          import json
          import sys
          manifest = json.load(open(sys.argv[1]))
          if manifest.get('dryRun') is not False:
              print('promote deploy-control manifest must be dryRun=false', file=sys.stderr)
              sys.exit(1)
          PY
          bundle_path="${RUNNER_TEMP:-/tmp}/route-ops-deploy-control-${GITHUB_RUN_ID}.tar.gz"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -C "$staging_dir" -czf "$bundle_path" deploy-control-manifest.json "${deploy_control_files[@]}"
          scripts/route-ops-deploy-control-bundle.sh validate-tar-manifest "$bundle_path"
          bundle_size="$(wc -c < "$bundle_path" | tr -d ' ')"
          bundle_sha="$(sha256sum "$bundle_path" | awk '{print $1}')"
          python3 - "$s3_uri" "$bundle_sha" <<'PY' > /tmp/route-ops-deploy-parameters.json
          import json
          import os
          import sys
          from urllib.parse import urlparse
          s3_uri, bundle_sha = sys.argv[1:3]
          driver_app_download_url = os.environ.get('DRIVER_APP_DOWNLOAD_URL', '').strip()
          if not driver_app_download_url:
              print('DRIVER_APP_DOWNLOAD_URL repository secret is required for Route Ops promote.', file=sys.stderr)
              sys.exit(1)
          parsed = urlparse(driver_app_download_url)
          if parsed.scheme not in {'http', 'https'} or not parsed.netloc:
              print('DRIVER_APP_DOWNLOAD_URL must be an http(s) URL', file=sys.stderr)
              sys.exit(1)
          print(json.dumps({
              'DeployControlBundleS3Uri': [s3_uri],
              'DeployControlBundleSha256': [bundle_sha],
              'DriverAppDownloadUrl': [driver_app_download_url],
          }, sort_keys=True))
          PY
          {
            echo "bundle_path=${bundle_path}"
            echo "bundle_sha=${bundle_sha}"
            echo "bundle_size=${bundle_size}"
            echo "s3_uri=${s3_uri}"
            echo "s3_key=${s3_key}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate AWS/SSM variable configuration
        shell: bash
        env:
          AWS_ROUTE_OPS_DEPLOY_ROLE_ARN: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          for name in AWS_ROUTE_OPS_DEPLOY_ROLE_ARN AWS_REGION SSM_ROUTE_OPS_TARGET_TAG_KEY SSM_ROUTE_OPS_TARGET_TAG_VALUE SSM_ROUTE_OPS_DOCUMENT_NAME SSM_ROUTE_OPS_DOCUMENT_VERSION; do
            value="${!name}"
            if [ -z "${value//[[:space:]]/}" ]; then echo "$name is required for Route Ops release SSM execution." >&2; exit 1; fi
          done
          if [ "$SSM_ROUTE_OPS_DOCUMENT_NAME" = "AWS-RunShellScript" ]; then echo "AWS-RunShellScript is not allowed for Route Ops release deploy." >&2; exit 1; fi
          if ! [[ "$SSM_ROUTE_OPS_DOCUMENT_VERSION" =~ ^[0-9]+$ ]]; then echo "SSM_ROUTE_OPS_DOCUMENT_VERSION must be a pinned numeric reviewed version." >&2; exit 1; fi

      - name: Configure AWS credentials through OIDC
        # aws-actions/configure-aws-credentials v6.2.0 (Node 24) pinned to full commit SHA.
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy-control artifact bucket
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$account_id" != "$ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID" ]; then echo "Route Ops deploy account mismatch." >&2; exit 1; fi
          if [ "$AWS_REGION" != "$ROUTE_OPS_EXPECTED_AWS_REGION" ]; then echo "Route Ops deploy region mismatch." >&2; exit 1; fi
          expected_bucket="route-ops-artifacts-${account_id}-${AWS_REGION}"
          if [ "$ROUTE_OPS_DEPLOY_CONTROL_BUCKET" != "$expected_bucket" ]; then echo "Route Ops deploy-control bucket must be ${expected_bucket}." >&2; exit 1; fi

      - name: Upload promote deploy-control bundle artifact
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.source_sync.outputs.bundle_path }}
          BUNDLE_SHA: ${{ steps.source_sync.outputs.bundle_sha }}
          BUNDLE_SIZE: ${{ steps.source_sync.outputs.bundle_size }}
          S3_URI: ${{ steps.source_sync.outputs.s3_uri }}
        run: |
          set -euo pipefail
          actual_sha="$(sha256sum "$BUNDLE_PATH" | awk '{print $1}')"
          actual_size="$(wc -c < "$BUNDLE_PATH" | tr -d ' ')"
          if [ "$actual_sha" != "$BUNDLE_SHA" ] || [ "$actual_size" != "$BUNDLE_SIZE" ]; then echo "Route Ops promote bundle changed before upload." >&2; exit 1; fi
          aws s3 cp "$BUNDLE_PATH" "$S3_URI" --sse AES256 --no-progress
          echo "Route Ops release promote bundle uploaded to ${S3_URI}"

      - name: Verify SSM target resolves to one online managed node
        id: target
        shell: bash
        env:
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
        run: |
          set -euo pipefail
          filter="Key=tag:${SSM_ROUTE_OPS_TARGET_TAG_KEY},Values=${SSM_ROUTE_OPS_TARGET_TAG_VALUE}"
          target_query="[length(InstanceInformationList), InstanceInformationList[0].InstanceId, InstanceInformationList[0].PingStatus, InstanceInformationList[0].AgentVersion]"
          read -r total_count instance_id ping_status agent_version <<< "$(aws ssm describe-instance-information --filters "$filter" --query "$target_query" --output text)"
          if [ "$total_count" != "1" ]; then echo "Route Ops SSM target tag must resolve to exactly one managed node; got $total_count." >&2; exit 1; fi
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then echo "Route Ops SSM target instance id is missing." >&2; exit 1; fi
          if [ "$ping_status" != "Online" ]; then echo "Route Ops SSM target must be Online; got $ping_status." >&2; exit 1; fi
          python3 - "$agent_version" <<'PY'
          import sys
          version = sys.argv[1]
          minimum = (3, 3, 2746, 0)
          parsed = tuple(int(part) for part in version.split('.'))
          parsed = parsed + (0,) * (len(minimum) - len(parsed))
          if parsed < minimum:
              print(f'SSM AgentVersion {version} must be >= 3.3.2746.0.', file=sys.stderr)
              sys.exit(1)
          PY
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"

      - name: Send custom SSM deploy command
        id: command
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.promote_validate.outputs.image_tag }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          test -f /tmp/route-ops-deploy-parameters.json
          read -r command_id target_count <<< "$(aws ssm send-command \
            --document-name "$SSM_ROUTE_OPS_DOCUMENT_NAME" \
            --document-version "$SSM_ROUTE_OPS_DOCUMENT_VERSION" \
            --instance-ids "$INSTANCE_ID" \
            --parameters file:///tmp/route-ops-deploy-parameters.json \
            --max-concurrency "1" \
            --max-errors "0" \
            --comment "RouteOps release promote ${IMAGE_TAG:0:12} run ${GITHUB_RUN_ID}" \
            --query 'Command.[CommandId,TargetCount]' \
            --output text)"
          if [ "$target_count" != "1" ]; then echo "Route Ops SSM SendCommand TargetCount must be 1; got $target_count." >&2; exit 1; fi
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"

      - name: Poll SSM deploy command status
        shell: bash
        env:
          COMMAND_ID: ${{ steps.command.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          terminal='^(Success|Cancelled|TimedOut|Failed|Cancelling)$'
          status="Pending"
          for _ in {1..720}; do
            status="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)"
            if [[ "$status" =~ $terminal ]]; then break; fi
            sleep 10
          done
          summary="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' --output json)"
          SUMMARY_JSON="$summary" python3 - <<'PY'
          import json
          import os
          import re
          data = json.loads(os.environ['SUMMARY_JSON'])
          for key in ('StandardOutputContent', 'StandardErrorContent'):
              value = str(data.get(key) or '')
              value = re.sub(r'clever_admin_ui=[^;\s]+', 'clever_admin_ui=<redacted>', value)
              if len(value) > 6000:
                  value = value[:6000] + '\n...<truncated>...'
              data[key] = value
          print(json.dumps(data, indent=2))
          PY
          if [ "$status" != "Success" ]; then echo "Route Ops SSM deploy command did not succeed: $status" >&2; exit 1; fi

      - name: Write redacted promote summary
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.promote_validate.outputs.image_tag }}
          BUNDLE_SHA: ${{ steps.source_sync.outputs.bundle_sha }}
          S3_URI: ${{ steps.source_sync.outputs.s3_uri }}
          COMMAND_ID: ${{ steps.command.outputs.command_id }}
        run: |
          set -euo pipefail
          cat > route-ops-release-promote-summary.md <<SUMMARY
          # Route Ops release promote summary

          Image tag: \`${IMAGE_TAG}\`
          Promote bundle SHA256: \`${BUNDLE_SHA}\`
          Promote bundle S3 URI: \`${S3_URI}\`
          SSM command id: \`${COMMAND_ID}\`

          Rollback remains the existing Route Ops host rollback path and \`scripts/rollback-route-ops-image.sh\`.
          SUMMARY
          cat route-ops-release-promote-summary.md

      - name: Upload redacted promote summary
        uses: actions/upload-artifact@v7
        with:
          name: route-ops-release-promote-summary
          path: route-ops-release-promote-summary.md
          retention-days: 14
