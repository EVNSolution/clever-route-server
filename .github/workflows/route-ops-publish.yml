name: Route Ops image publish

on:
  workflow_dispatch:
    inputs:
      deployed_base_ref:
        description: "Git SHA/ref currently deployed in production; scope guard compares this ref to HEAD"
        required: true
      allow_compose_image_variable_bootstrap:
        description: "Allow the one-time compose image-variable bootstrap change"
        required: false
        type: boolean
        default: false
      allow_geocode_osrm_lane:
        description: "Allow reviewed geocoding/OSRM support files in this Route Ops publish"
        required: false
        type: boolean
        default: false
      allow_commerce_sync_lane:
        description: "Allow reviewed Woo/Shopify sync support files in this Route Ops publish"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: route-ops-publish
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RUNTIME_IMAGE: ghcr.io/evnsolution/clever-route-server-delivery-api
  MIGRATE_IMAGE: ghcr.io/evnsolution/clever-route-server-delivery-api-migrate
  FRONTEND_STATIC_IMAGE: ghcr.io/evnsolution/clever-route-server-route-ops-web-static

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Route Ops publish is manual-only and must run from refs/heads/main." >&2
          exit 1

      - name: Require actor allowlist
        shell: bash
        env:
          DEPLOY_ALLOWED_ACTORS: ${{ vars.DEPLOY_ALLOWED_ACTORS }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ALLOWED_ACTORS//[[:space:],]/}" ]; then
            echo "DEPLOY_ALLOWED_ACTORS is required and must fail closed before publishing Route Ops images." >&2
            exit 1
          fi
          IFS=',' read -ra actors <<< "$DEPLOY_ALLOWED_ACTORS"
          allowed=false
          for actor in "${actors[@]}"; do
            actor="$(echo "$actor" | xargs)"
            if [ "$actor" = "$GITHUB_ACTOR_NAME" ]; then allowed=true; fi
          done
          if [ "$allowed" != true ]; then
            echo "$GITHUB_ACTOR_NAME is not allowed to publish Route Ops images." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Guard ignore hygiene
        run: node scripts/check-ignore-hygiene.mjs

      - name: Install pinned gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Guard secret scans before publish
        env:
          SECRET_SCAN_REQUIRE_GITLEAKS: "1"
        run: scripts/scan-secrets.sh --history --worktree

      - name: Guard Route Ops publish scope
        shell: bash
        run: |
          set -euo pipefail
          extra=()
          if [ "${{ inputs.allow_compose_image_variable_bootstrap }}" = "true" ]; then
            extra+=(--allow-compose-bootstrap)
          fi
          if [ "${{ inputs.allow_geocode_osrm_lane }}" = "true" ]; then
            extra+=(--allow-geocode-osrm-lane)
          fi
          if [ "${{ inputs.allow_commerce_sync_lane }}" = "true" ]; then
            extra+=(--allow-commerce-sync-lane)
          fi
          scripts/guard-route-ops-deploy-scope.mjs --base "${{ inputs.deployed_base_ref }}" --head "$GITHUB_SHA" --json "${extra[@]}"

      - name: Build Route Ops web static artifact metadata
        id: web_static
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix apps/route-ops-web ci
          npm --prefix apps/route-ops-web run build
          test -f apps/route-ops-web/dist/.vite/manifest.json
          test -d apps/route-ops-web/dist/assets
          test -d apps/route-ops-web/public/vendor
          static_sha="$(tar -C apps/route-ops-web --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf - dist public | sha256sum | awk '{print $1}')"
          echo "static_sha=${static_sha}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          schema_sha="$(sha256sum apps/delivery-api/prisma/schema.prisma | awk '{print $1}')"
          echo "schema_sha=${schema_sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        # docker/login-action v4.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v4.1.0 (Node 24) pinned to full commit SHA.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push Route Ops web static image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/route-ops-web/Dockerfile
          target: static
          push: true
          tags: ${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.route-ops-web-static-sha=${{ steps.web_static.outputs.static_sha }}
            org.clever-route.image-role=route-ops-web-static

      - name: Build and push runtime image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/delivery-api/Dockerfile
          target: runtime
          push: true
          tags: ${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.prisma-schema-sha=${{ steps.meta.outputs.schema_sha }}
            org.clever-route.image-role=runtime

      - name: Build and push migrate image
        # docker/build-push-action v7.2.0 (Node 24) pinned to full commit SHA.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: apps/delivery-api/Dockerfile
          target: migrate
          push: true
          tags: ${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.clever-route.prisma-schema-sha=${{ steps.meta.outputs.schema_sha }}
            org.clever-route.image-role=migrate

      - name: Redacted manual EC2 deploy summary
        shell: bash
        run: |
          cat > route-ops-publish-summary.md <<SUMMARY
          # Route Ops image publish summary

          Image tag: \`${{ steps.meta.outputs.image_tag }}\`
          Prisma schema SHA: \`${{ steps.meta.outputs.schema_sha }}\`
          Route Ops web static SHA: \`${{ steps.web_static.outputs.static_sha }}\`

          Route Ops web static image:
          \`${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }}\`

          Runtime image:
          \`${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }}\`

          Migrate image:
          \`${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }}\`

          Preferred SSM deploy workflow input shape, run only after reviewing this publish and AWS/SSM preflight:

          \`\`\`bash
          gh workflow run route-ops-ssm-deploy.yml \
            --ref main \
            -f image_tag=${{ steps.meta.outputs.image_tag }} \
            -f prisma_schema_sha=${{ steps.meta.outputs.schema_sha }} \
            -f delivery_api_image=${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            -f delivery_api_migrate_image=${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
            -f publish_evidence_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            -f dry_run=true

          The SSM wrapper derives \`ROUTE_OPS_WEB_STATIC_IMAGE\` and \`ROUTE_OPS_WEB_STATIC_VOLUME\` from the immutable \`image_tag\`; verify they match:
          \`${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }}\` and \`clever-route-route-ops-web-static-${{ steps.meta.outputs.image_tag }}\`.
          Use \`dry_run=false\` only after the S3/SSM deploy-control handoff dry validation succeeds and production mutation is explicitly approved.
          \`\`\`

          Emergency/manual host deploy command shape, run on the production host only after separate approval:

          \`\`\`bash
          cd /srv/clever-route-server
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }} \
          PRISMA_SCHEMA_SHA=${{ steps.meta.outputs.schema_sha }} \
          DELIVERY_API_IMAGE=${{ env.RUNTIME_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
          DELIVERY_API_MIGRATE_IMAGE=${{ env.MIGRATE_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
          ROUTE_OPS_WEB_STATIC_IMAGE=${{ env.FRONTEND_STATIC_IMAGE }}:${{ steps.meta.outputs.image_tag }} \
          ROUTE_OPS_WEB_STATIC_VOLUME=clever-route-route-ops-web-static-${{ steps.meta.outputs.image_tag }} \
          scripts/ssm-route-ops-deploy.sh
          \`\`\`

          This workflow did not SSH to production, did not deploy production, and did not receive production SSH/admin smoke secrets.
          SUMMARY
          cat route-ops-publish-summary.md

      - name: Upload redacted publish summary
        uses: actions/upload-artifact@v7
        with:
          name: route-ops-publish-summary
          path: route-ops-publish-summary.md
          retention-days: 1
