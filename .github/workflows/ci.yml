name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_verify:
        description: "Run the full Route Ops verification lane manually"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  route-ops-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      changed_files_count: ${{ steps.classify.outputs.changed_files_count }}
      route_ops_changed: ${{ steps.classify.outputs.route_ops_changed }}
      web_changed: ${{ steps.classify.outputs.web_changed }}
      api_changed: ${{ steps.classify.outputs.api_changed }}
      deploy_changed: ${{ steps.classify.outputs.deploy_changed }}
      workflow_changed: ${{ steps.classify.outputs.workflow_changed }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      critical_changed: ${{ steps.classify.outputs.critical_changed }}
      full_required: ${{ steps.classify.outputs.full_required }}
      web_artifact_required: ${{ steps.classify.outputs.web_artifact_required }}
      api_test_profile: ${{ steps.classify.outputs.api_test_profile }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect Route Ops changed files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA" > changed-files.txt
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              if git fetch --no-tags --depth=1 origin "$before" && git diff --name-only "$before" "$GITHUB_SHA" > changed-files.txt; then
                :
              else
                echo "Could not determine exact push diff; classifying all tracked files fail-closed." >&2
                git ls-files > changed-files.txt
              fi
            else
              git ls-files > changed-files.txt
            fi
          else
            git ls-files > changed-files.txt
          fi
          cat changed-files.txt
      - name: Classify Route Ops changes
        id: classify
        shell: bash
        env:
          FULL_VERIFY: ${{ github.event_name == 'workflow_dispatch' && inputs.full_verify == true }}
        run: |
          set -euo pipefail
          args=(--github-output "$GITHUB_OUTPUT")
          if [ "$FULL_VERIFY" = "true" ]; then
            args+=(--full-verify)
          fi
          node scripts/ci/route-ops-change-classifier.mjs "${args[@]}" < changed-files.txt
          cat "$GITHUB_OUTPUT"

  route-ops-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: route-ops-changes
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Ignore hygiene
        run: node scripts/check-ignore-hygiene.mjs
      - name: Secret scan staged/worktree
        run: scripts/scan-secrets.sh --worktree
      - name: Route Ops classifier tests
        if: needs.route-ops-changes.outputs.workflow_changed == 'true' || needs.route-ops-changes.outputs.full_required == 'true'
        run: node tests/ci/route-ops-change-classifier.test.mjs
      - name: Route Ops deploy scope guard (opt-in PR only)
        if: github.event_name == 'pull_request' && needs.route-ops-changes.outputs.route_ops_changed == 'true' && contains(github.event.pull_request.labels.*.name, 'route-ops-deploy-scope')
        run: scripts/guard-route-ops-deploy-scope.mjs --base "${{ github.event.pull_request.base.sha }}" --head "$GITHUB_SHA" --json --allow-compose-bootstrap
      - name: Route Ops release static checks
        if: needs.route-ops-changes.outputs.deploy_changed == 'true' || needs.route-ops-changes.outputs.workflow_changed == 'true' || needs.route-ops-changes.outputs.full_required == 'true'
        run: |
          for script in scripts/ssm-simple-route-ops-deploy.sh scripts/osrm-ontario.sh scripts/monitor-route-ops-production.sh apps/delivery-api/scripts/guard-prisma-db-push.sh tests/deploy/ssm-simple-route-ops-deploy.test.sh tests/deploy/route-ops-prisma-db-push-guard.test.sh tests/deploy/monitor-route-ops-production.test.sh; do
            bash -n "$script"
          done
          tests/deploy/route-ops-prisma-db-push-guard.test.sh
          tests/deploy/ssm-simple-route-ops-deploy.test.sh
          tests/deploy/monitor-route-ops-production.test.sh
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh preflight
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh prepare
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh smoke

  route-ops-web:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs:
      - route-ops-changes
      - route-ops-hygiene
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        (needs.route-ops-changes.outputs.web_changed == 'true' ||
         needs.route-ops-changes.outputs.web_artifact_required == 'true' ||
         needs.route-ops-changes.outputs.full_required == 'true')) ||
      (github.event_name == 'push' &&
        ((needs.route-ops-changes.outputs.critical_changed == 'true' &&
          needs.route-ops-changes.outputs.web_artifact_required == 'true') ||
         needs.route-ops-changes.outputs.full_required == 'true'))
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/route-ops-web/package-lock.json
      - name: Install Route Ops web dependencies
        run: npm --prefix apps/route-ops-web ci
      - name: Lint Route Ops web
        if: needs.route-ops-changes.outputs.web_changed == 'true' || needs.route-ops-changes.outputs.full_required == 'true' || github.event_name == 'workflow_dispatch'
        run: npm --prefix apps/route-ops-web run lint
      - name: Typecheck Route Ops web
        if: needs.route-ops-changes.outputs.web_changed == 'true' || needs.route-ops-changes.outputs.full_required == 'true' || github.event_name == 'workflow_dispatch'
        run: npm --prefix apps/route-ops-web run typecheck
      - name: Test Route Ops web
        if: needs.route-ops-changes.outputs.web_changed == 'true' || needs.route-ops-changes.outputs.full_required == 'true' || github.event_name == 'workflow_dispatch'
        run: npm --prefix apps/route-ops-web run test
      - name: Build Route Ops web
        run: npm --prefix apps/route-ops-web run build
      - name: Upload Route Ops web dist
        uses: actions/upload-artifact@v7
        with:
          name: route-ops-web-dist
          path: apps/route-ops-web/dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  delivery-api-route-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - route-ops-changes
      - route-ops-hygiene
      - route-ops-web
    if: >-
      always() &&
      needs.route-ops-hygiene.result == 'success' &&
      (needs.route-ops-web.result == 'success' || needs.route-ops-web.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
         (needs.route-ops-changes.outputs.api_changed == 'true' ||
          needs.route-ops-changes.outputs.full_required == 'true')) ||
       (github.event_name == 'push' &&
         ((needs.route-ops-changes.outputs.api_changed == 'true' &&
           needs.route-ops-changes.outputs.critical_changed == 'true') ||
          needs.route-ops-changes.outputs.full_required == 'true')))
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/delivery-api/package-lock.json
      - name: Install delivery API dependencies
        run: npm --prefix apps/delivery-api ci
      - name: Prisma generate
        run: npm --prefix apps/delivery-api run prisma:generate
      - name: Lint delivery API
        run: npm --prefix apps/delivery-api run lint
      - name: Typecheck delivery API
        run: npm --prefix apps/delivery-api run typecheck
      - name: Download Route Ops web dist
        if: needs.route-ops-changes.outputs.web_artifact_required == 'true' || needs.route-ops-changes.outputs.full_required == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v8
        with:
          name: route-ops-web-dist
          path: apps/route-ops-web/dist
      - name: Route geometry targeted tests
        if: needs.route-ops-changes.outputs.api_test_profile == 'route_geometry' && needs.route-ops-changes.outputs.full_required != 'true' && github.event_name != 'workflow_dispatch'
        run: >
          npm --prefix apps/delivery-api run test --
          tests/osrm-route-geometry.client.test.ts
          tests/route-plan-geometry-cache.test.ts
          tests/refresh-route-geometry-cache.script.test.ts
          tests/route-plan.service.test.ts
          tests/route-plan.repository.test.ts
      - name: Route Ops targeted tests
        if: needs.route-ops-changes.outputs.api_test_profile != 'route_geometry' || needs.route-ops-changes.outputs.full_required == 'true' || github.event_name == 'workflow_dispatch'
        run: >
          npm --prefix apps/delivery-api run test --
          tests/admin-commerce-auth.test.ts
          tests/admin-commerce-connections-ui.routes.test.ts
          tests/admin-ui-route-inventory.test.ts
          tests/admin-ui-route-planning.optimize.test.ts
          tests/vroom-route-optimizer.client.test.ts
          tests/admin-route-plans.routes.test.ts
          tests/admin-notification.dependencies.test.ts
          tests/admin-notification.repository.test.ts
          tests/admin-notification.service.test.ts
          tests/admin-notification.stream.test.ts
          tests/admin-notification.postgres-stream.test.ts
          tests/order-sync.repository.test.ts
          tests/driver-auth.repository.test.ts
          tests/driver-auth.routes.test.ts
          tests/driver.dependencies.test.ts
          tests/driver-commerce-domain.test.ts
          tests/driver-token-verifier.test.ts
          tests/driver-token-access.repository.test.ts
          tests/driver-consent.repository.test.ts
          tests/driver-event.repository.test.ts
          tests/driver-assigned-route.repository.test.ts
          tests/driver-route-access.repository.test.ts
          tests/driver-route-access.routes.test.ts
          tests/driver-proof-media.repository.test.ts
          tests/driver-self-service.repository.test.ts
          tests/geocoding.service.test.ts
          tests/osrm-route-geometry.client.test.ts
          tests/woocommerce-order-sync.service.test.ts
          tests/route-plan.repository.test.ts
          tests/route-plan.service.test.ts
          tests/route-scope-config.test.ts
          tests/prisma-schema.test.ts
      - name: Build delivery API
        run: npm --prefix apps/delivery-api run build
      - name: Compose config validation with image placeholders
        run: |
          cp infra/env/delivery-api.env.example infra/env/delivery-api.env
          ROUTE_OPS_COMPOSE_PROJECT_NAME=clever-route \
          DELIVERY_API_IMAGE=ghcr.io/evnsolution/clever-route-server-delivery-api:ci \
          ROUTE_OPS_WEB_STATIC_IMAGE=ghcr.io/evnsolution/clever-route-server-route-ops-web-static:ci \
          ROUTE_OPS_WEB_STATIC_VOLUME=clever-route-route-ops-web-static-ci \
          PRISMA_SCHEMA_SHA=abcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcd \
          docker compose -p clever-route -f infra/compose/docker-compose.prod.yml config --quiet
          rm -f infra/env/delivery-api.env
