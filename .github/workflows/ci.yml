name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  route-ops-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v6
      - name: Detect Route Ops deploy-lane changes
        id: route_ops_changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA")
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before" || true
              files=$(git diff --name-only "$before" "$GITHUB_SHA" 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || true)
            else
              files=$(git ls-files)
            fi
          fi
          if printf '%s\n' "$files" | grep -Eq '^(AGENTS\.md|apps/route-ops-web/.*|apps/delivery-api/AGENTS\.md|apps/delivery-api/Dockerfile|apps/delivery-api/scripts/guard-prisma-db-push\.sh|apps/delivery-api/src/routes/admin-commerce-connections-ui\.routes\.ts|apps/delivery-api/src/routes/admin-ui-[^/]+\.ts|apps/delivery-api/tests/admin-commerce-connections-ui\.routes\.test\.ts|apps/delivery-api/tests/admin-ui-[^/]+\.test\.ts|infra/compose/docker-compose\.prod\.yml|infra/vroom/config\.yml|infra/env/delivery-api\.env\.example|scripts/(guard-route-ops-deploy-scope|check-ignore-hygiene|scan-secrets|smoke-route-ops-production|ssm-simple-route-ops-deploy|osrm-ontario|monitor-route-ops-production)\.(mjs|sh)|tests/deploy/(ssm-simple-route-ops-deploy|route-ops-prisma-db-push-guard|monitor-route-ops-production)\.test\.sh|docs/(architecture/.*|migration/(local-development-runbook|source-inventory)\.md|deployment/(route-ops-simple-ssm-deploy|route-ops-osrm-ontario|route-ops-vroom)\.md|development/script-tooling\.md)|\.github/workflows/(ci|route-ops-simple-deploy)\.yml|\.gitignore|\.dockerignore|\.gitleaks\.toml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Ignore hygiene
        run: node scripts/check-ignore-hygiene.mjs
      - name: Secret scan staged/worktree
        run: scripts/scan-secrets.sh --worktree
      - name: Route Ops deploy scope guard (opt-in PR only)
        if: github.event_name == 'pull_request' && steps.route_ops_changes.outputs.changed == 'true' && contains(github.event.pull_request.labels.*.name, 'route-ops-deploy-scope')
        run: scripts/guard-route-ops-deploy-scope.mjs --base "${{ github.event.pull_request.base.sha }}" --head "$GITHUB_SHA" --json --allow-compose-bootstrap
      - name: Route Ops release static checks
        if: steps.route_ops_changes.outputs.changed == 'true'
        run: |
          for script in scripts/ssm-simple-route-ops-deploy.sh scripts/osrm-ontario.sh scripts/monitor-route-ops-production.sh apps/delivery-api/scripts/guard-prisma-db-push.sh tests/deploy/ssm-simple-route-ops-deploy.test.sh tests/deploy/route-ops-prisma-db-push-guard.test.sh tests/deploy/monitor-route-ops-production.test.sh; do
            bash -n "$script"
          done
          tests/deploy/route-ops-prisma-db-push-guard.test.sh
          tests/deploy/ssm-simple-route-ops-deploy.test.sh
          tests/deploy/monitor-route-ops-production.test.sh
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh preflight
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh prepare
          OSRM_DRY_RUN=1 scripts/osrm-ontario.sh smoke

  route-ops-web:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: route-ops-hygiene
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect Route Ops web dist dependency changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA")
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before" || true
              files=$(git diff --name-only "$before" "$GITHUB_SHA" 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || true)
            else
              files=$(git ls-files)
            fi
          fi
          # The delivery-api Route Ops job always downloads route-ops-web-dist before
          # running admin/route tests. Build and upload that artifact whenever either
          # the web app changed or the delivery Route Ops lane changed.
          if printf '%s\n' "$files" | grep -Eq '^(apps/route-ops-web/.*|apps/delivery-api/Dockerfile|apps/delivery-api/scripts/guard-prisma-db-push\.sh|apps/delivery-api/prisma/.*|apps/delivery-api/src/routes/(admin-commerce-connections-ui|admin-route-plans|driver-auth|driver-events)\.routes\.ts|apps/delivery-api/src/routes/admin-ui-[^/]+\.ts|apps/delivery-api/src/modules/(commerce|driver|geocoding|route-plans|route-ops|shopify|woocommerce|wordpress-plugin)/.*|apps/delivery-api/tests/(admin-commerce-auth|admin-commerce-connections-ui\.routes|admin-route-plans\.routes|driver-auth\.(repository|routes)|driver\.dependencies|driver-route-access\.routes|geocoding\.service|osrm-route-geometry\.client|vroom-route-optimizer\.client|woocommerce-order-sync\.service|route-plan\.(repository|service)|route-scope-config|prisma-schema)\.test\.ts|apps/delivery-api/tests/admin-ui-[^/]+\.test\.ts|infra/compose/docker-compose\.prod\.yml|infra/vroom/config\.yml|infra/env/delivery-api\.env\.example|\.github/workflows/(ci|route-ops-simple-deploy)\.yml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/route-ops-web/package-lock.json
      - name: Install Route Ops web dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/route-ops-web ci
      - name: Lint Route Ops web
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/route-ops-web run lint
      - name: Typecheck Route Ops web
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/route-ops-web run typecheck
      - name: Test Route Ops web
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/route-ops-web run test
      - name: Build Route Ops web
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/route-ops-web run build
      - name: Upload Route Ops web dist
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: route-ops-web-dist
          path: apps/route-ops-web/dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  delivery-api-route-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - route-ops-hygiene
      - route-ops-web
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect delivery API Route Ops changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "$GITHUB_SHA")
          else
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git fetch --no-tags --depth=1 origin "$before" || true
              files=$(git diff --name-only "$before" "$GITHUB_SHA" 2>/dev/null || git diff --name-only HEAD^ HEAD 2>/dev/null || true)
            else
              files=$(git ls-files)
            fi
          fi
          if printf '%s\n' "$files" | grep -Eq '^(apps/route-ops-web/.*|apps/delivery-api/Dockerfile|apps/delivery-api/scripts/guard-prisma-db-push\.sh|apps/delivery-api/prisma/.*|apps/delivery-api/src/routes/(admin-commerce-connections-ui|admin-route-plans|driver-auth|driver-events)\.routes\.ts|apps/delivery-api/src/routes/admin-ui-[^/]+\.ts|apps/delivery-api/src/modules/(commerce|driver|geocoding|route-plans|route-ops|shopify|woocommerce|wordpress-plugin)/.*|apps/delivery-api/tests/(admin-commerce-auth|admin-commerce-connections-ui\.routes|admin-route-plans\.routes|driver-auth\.(repository|routes)|driver\.dependencies|driver-route-access\.routes|geocoding\.service|osrm-route-geometry\.client|vroom-route-optimizer\.client|woocommerce-order-sync\.service|route-plan\.(repository|service)|route-scope-config|prisma-schema)\.test\.ts|apps/delivery-api/tests/admin-ui-[^/]+\.test\.ts|infra/compose/docker-compose\.prod\.yml|infra/vroom/config\.yml|infra/env/delivery-api\.env\.example|\.github/workflows/(ci|route-ops-simple-deploy)\.yml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/delivery-api/package-lock.json
      - name: Install delivery API dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/delivery-api ci
      - name: Prisma generate
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/delivery-api run prisma:generate
      - name: Lint delivery API
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/delivery-api run lint
      - name: Typecheck delivery API
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/delivery-api run typecheck
      - name: Download Route Ops web dist
        if: steps.changes.outputs.changed == 'true'
        uses: actions/download-artifact@v8
        with:
          name: route-ops-web-dist
          path: apps/route-ops-web/dist
      - name: Route Ops targeted tests
        if: steps.changes.outputs.changed == 'true'
        run: >
          npm --prefix apps/delivery-api run test --
          tests/admin-commerce-auth.test.ts
          tests/admin-commerce-connections-ui.routes.test.ts
          tests/admin-ui-route-inventory.test.ts
          tests/admin-ui-route-planning.optimize.test.ts
          tests/vroom-route-optimizer.client.test.ts
          tests/admin-route-plans.routes.test.ts
          tests/driver-auth.repository.test.ts
          tests/driver-auth.routes.test.ts
          tests/driver.dependencies.test.ts
          tests/driver-commerce-domain.test.ts
          tests/driver-token-verifier.test.ts
          tests/driver-token-access.repository.test.ts
          tests/driver-consent.repository.test.ts
          tests/driver-event.repository.test.ts
          tests/driver-assigned-route.repository.test.ts
          tests/driver-route-access.repository.test.ts
          tests/driver-route-access.routes.test.ts
          tests/driver-proof-media.repository.test.ts
          tests/driver-self-service.repository.test.ts
          tests/geocoding.service.test.ts
          tests/osrm-route-geometry.client.test.ts
          tests/woocommerce-order-sync.service.test.ts
          tests/route-plan.repository.test.ts
          tests/route-plan.service.test.ts
          tests/route-scope-config.test.ts
          tests/prisma-schema.test.ts
      - name: Build delivery API
        if: steps.changes.outputs.changed == 'true'
        run: npm --prefix apps/delivery-api run build
      - name: Compose config validation with image placeholders
        if: steps.changes.outputs.changed == 'true'
        run: |
          cp infra/env/delivery-api.env.example infra/env/delivery-api.env
          ROUTE_OPS_COMPOSE_PROJECT_NAME=clever-route \
          DELIVERY_API_IMAGE=ghcr.io/evnsolution/clever-route-server-delivery-api:ci \
          ROUTE_OPS_WEB_STATIC_IMAGE=ghcr.io/evnsolution/clever-route-server-route-ops-web-static:ci \
          ROUTE_OPS_WEB_STATIC_VOLUME=clever-route-route-ops-web-static-ci \
          PRISMA_SCHEMA_SHA=abcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcdefabcd \
          docker compose -p clever-route -f infra/compose/docker-compose.prod.yml config --quiet
          rm -f infra/env/delivery-api.env
