name: Route Ops SSM deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Immutable git SHA tag published by Route Ops image publish"
        required: true
      prisma_schema_sha:
        description: "SHA256 of apps/delivery-api/prisma/schema.prisma from publish summary"
        required: true
      delivery_api_image:
        description: "Runtime image ghcr.io/evnsolution/clever-route-server-delivery-api:<sha>"
        required: true
      delivery_api_migrate_image:
        description: "Migrate image ghcr.io/evnsolution/clever-route-server-delivery-api-migrate:<sha>"
        required: true
      route_engine_image:
        description: "Route engine worker image ghcr.io/evnsolution/route-engine-worker:<sha>"
        required: true
      route_engine_publish_evidence_url:
        description: "Successful route_engine worker image publish workflow run URL for route_engine_image"
        required: true
      publish_evidence_url:
        description: "Successful route-ops-publish workflow run URL for this image tag"
        required: true
      dry_run:
        description: "Validate S3/SSM deploy-control handoff without syncing files or deploying"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: route-ops-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUNTIME_IMAGE_REPO: ghcr.io/evnsolution/clever-route-server-delivery-api
      MIGRATE_IMAGE_REPO: ghcr.io/evnsolution/clever-route-server-delivery-api-migrate
      ROUTE_ENGINE_IMAGE_REPO: ghcr.io/evnsolution/route-engine-worker
      ROUTE_OPS_DEPLOY_CONTROL_BUCKET: route-ops-artifacts-902837199612-ap-northeast-2
      ROUTE_OPS_DEPLOY_CONTROL_PREFIX: artifacts/route-ops/prod/deploy-control
      ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID: "902837199612"
      ROUTE_OPS_EXPECTED_AWS_REGION: ap-northeast-2
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Route Ops SSM deploy is manual-only and must run from refs/heads/main." >&2
          exit 1

      - name: Require deploy actor allowlist
        shell: bash
        env:
          DEPLOY_ALLOWED_ACTORS: ${{ vars.DEPLOY_ALLOWED_ACTORS }}
          DEPLOY_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_ALLOWED_ACTORS//[[:space:],]/}" ]; then
            echo "DEPLOY_ALLOWED_ACTORS is required and must fail closed before AWS credentials." >&2
            exit 1
          fi
          IFS=',' read -ra actors <<< "$DEPLOY_ALLOWED_ACTORS"
          allowed=false
          for actor in "${actors[@]}"; do
            actor="$(echo "$actor" | xargs)"
            if [ "$actor" = "$DEPLOY_ACTOR" ]; then allowed=true; fi
          done
          if [ "$allowed" != true ]; then
            echo "$DEPLOY_ACTOR is not allowed to deploy Route Ops." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate deployment inputs and provenance
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ inputs.prisma_schema_sha }}
          DELIVERY_API_IMAGE: ${{ inputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ inputs.delivery_api_migrate_image }}
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ inputs.route_engine_publish_evidence_url }}
          PUBLISH_EVIDENCE_URL: ${{ inputs.publish_evidence_url }}
          DRY_RUN: ${{ inputs.dry_run }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          hex40='^[0-9a-fA-F]{40}$'
          hex64='^[0-9a-fA-F]{64}$'
          if ! [[ "$IMAGE_TAG" =~ $hex40 ]]; then echo "image_tag must be a 40-hex git SHA." >&2; exit 1; fi
          if ! [[ "$PRISMA_SCHEMA_SHA" =~ $hex64 ]]; then echo "prisma_schema_sha must be a 64-hex SHA256." >&2; exit 1; fi
          expected_runtime="${RUNTIME_IMAGE_REPO}:${IMAGE_TAG}"
          expected_migrate="${MIGRATE_IMAGE_REPO}:${IMAGE_TAG}"
          if [ "$DELIVERY_API_IMAGE" != "$expected_runtime" ]; then echo "delivery_api_image must be $expected_runtime" >&2; exit 1; fi
          if [ "$DELIVERY_API_MIGRATE_IMAGE" != "$expected_migrate" ]; then echo "delivery_api_migrate_image must be $expected_migrate" >&2; exit 1; fi
          if ! [[ "$ROUTE_ENGINE_IMAGE" =~ ^${ROUTE_ENGINE_IMAGE_REPO}:[0-9a-fA-F]{40}$ ]]; then
            echo "route_engine_image must be ${ROUTE_ENGINE_IMAGE_REPO}:<40-hex-sha>" >&2
            exit 1
          fi
          route_engine_tag="${ROUTE_ENGINE_IMAGE##*:}"
          if ! [[ "$ROUTE_ENGINE_PUBLISH_EVIDENCE_URL" =~ ^https://github\.com/EVNSolution/route_engine/actions/runs/[0-9]+/?$ ]]; then
            echo "route_engine_publish_evidence_url must be the successful route_engine worker image publish run URL." >&2
            exit 1
          fi
          if ! [[ "$PUBLISH_EVIDENCE_URL" =~ ^https://github\.com/EVNSolution/clever-route-server/actions/runs/[0-9]+/?$ ]]; then
            echo "publish_evidence_url must be the successful route-ops-publish run URL." >&2
            exit 1
          fi
          if [ "$DRY_RUN" != "true" ] && [ "$DRY_RUN" != "false" ]; then
            echo "dry_run must be either true or false." >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git cat-file -e "${IMAGE_TAG}^{commit}"
          git merge-base --is-ancestor "$IMAGE_TAG" origin/main
          publish_run_id="${PUBLISH_EVIDENCE_URL%/}"
          publish_run_id="${publish_run_id##*/}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${publish_run_id}" \
            -o /tmp/route-ops-publish-run.json
          route_engine_publish_run_id="${ROUTE_ENGINE_PUBLISH_EVIDENCE_URL%/}"
          route_engine_publish_run_id="${route_engine_publish_run_id##*/}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/EVNSolution/route_engine/actions/runs/${route_engine_publish_run_id}" \
            -o /tmp/route-engine-publish-run.json
          python3 - "$IMAGE_TAG" "$route_engine_tag" <<'PY'
          import json
          import sys

          image_tag = sys.argv[1].lower()
          route_engine_tag = sys.argv[2].lower()

          def load(path: str) -> dict:
              with open(path, encoding='utf-8') as fh:
                  return json.load(fh)

          def fail(message: str) -> None:
              print(message, file=sys.stderr)
              sys.exit(1)

          def verify_run(run: dict, *, repo_name: str, head_sha: str, workflow_name: str, workflow_path_suffix: str, label: str) -> None:
              repo = (run.get('repository') or {}).get('full_name')
              if repo != repo_name:
                  fail(f'{label} publish evidence run repository mismatch: {repo}')
              if run.get('event') != 'workflow_dispatch':
                  fail(f'{label} publish evidence run event must be workflow_dispatch: {run.get("event")}')
              if run.get('conclusion') != 'success':
                  fail(f'{label} publish evidence run conclusion must be success: {run.get("conclusion")}')
              if run.get('head_branch') != 'main':
                  fail(f'{label} publish evidence run branch must be main: {run.get("head_branch")}')
              if str(run.get('head_sha', '')).lower() != head_sha:
                  fail(f'{label} publish evidence run head_sha must match requested image tag')
              name = run.get('name') or ''
              path = run.get('path') or ''
              if name != workflow_name and not path.endswith(workflow_path_suffix):
                  fail(f'{label} publish evidence run must be {workflow_name}: name={name!r} path={path!r}')

          verify_run(
              load('/tmp/route-ops-publish-run.json'),
              repo_name='EVNSolution/clever-route-server',
              head_sha=image_tag,
              workflow_name='Route Ops image publish',
              workflow_path_suffix='route-ops-publish.yml',
              label='Route Ops',
          )
          verify_run(
              load('/tmp/route-engine-publish-run.json'),
              repo_name='EVNSolution/route_engine',
              head_sha=route_engine_tag,
              workflow_name='Route Engine worker image publish',
              workflow_path_suffix='route-engine-worker-publish.yml',
              label='route_engine',
          )
          PY
          echo "Route Ops deploy input validation passed for ${IMAGE_TAG} with route_engine ${route_engine_tag}."

      - name: Checkout deploy-control source at image tag
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          git checkout --detach "$IMAGE_TAG"
          deploy_control_source_sha="$(git rev-parse HEAD)"
          if [ "${deploy_control_source_sha,,}" != "${IMAGE_TAG,,}" ]; then
            echo "deploy-control source checkout mismatch: expected ${IMAGE_TAG}, got ${deploy_control_source_sha}" >&2
            exit 1
          fi
          echo "Route Ops deploy-control source checkout pinned to ${deploy_control_source_sha}."

      - name: Validate AWS/SSM variable configuration
        shell: bash
        env:
          AWS_ROUTE_OPS_DEPLOY_ROLE_ARN: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          required=(AWS_ROUTE_OPS_DEPLOY_ROLE_ARN AWS_REGION SSM_ROUTE_OPS_TARGET_TAG_KEY SSM_ROUTE_OPS_TARGET_TAG_VALUE SSM_ROUTE_OPS_DOCUMENT_NAME SSM_ROUTE_OPS_DOCUMENT_VERSION)
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then echo "$name GitHub variable is required." >&2; exit 1; fi
          done
          if [ "$SSM_ROUTE_OPS_DOCUMENT_NAME" = "AWS-RunShellScript" ]; then
            echo "AWS-RunShellScript is not allowed for production Route Ops deploy." >&2
            exit 1
          fi
          if ! [[ "$SSM_ROUTE_OPS_DOCUMENT_VERSION" =~ ^[0-9]+$ ]]; then
            echo "SSM_ROUTE_OPS_DOCUMENT_VERSION must be an explicit numeric reviewed document version." >&2
            exit 1
          fi
          if [ "$AWS_REGION" != "$ROUTE_OPS_EXPECTED_AWS_REGION" ]; then
            echo "Route Ops deploy is currently approved only for ${ROUTE_OPS_EXPECTED_AWS_REGION}; got AWS_REGION=${AWS_REGION}." >&2
            exit 1
          fi

      - name: Prepare deploy control files for custom SSM document
        id: source_sync
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ inputs.prisma_schema_sha }}
          DELIVERY_API_IMAGE: ${{ inputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ inputs.delivery_api_migrate_image }}
          ROUTE_ENGINE_IMAGE: ${{ inputs.route_engine_image }}
          ROUTE_ENGINE_PUBLISH_EVIDENCE_URL: ${{ inputs.route_engine_publish_evidence_url }}
          PUBLISH_EVIDENCE_URL: ${{ inputs.publish_evidence_url }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEPLOY_CONTROL_BUCKET: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_BUCKET }}
          DEPLOY_CONTROL_PREFIX: ${{ env.ROUTE_OPS_DEPLOY_CONTROL_PREFIX }}
        run: |
          set -euo pipefail
          deploy_control_files=()
          while IFS= read -r file; do
            deploy_control_files+=("$file")
          done < <(scripts/route-ops-deploy-control-bundle.sh bundle-files)
          for file in "${deploy_control_files[@]}"; do
            scripts/route-ops-deploy-control-bundle.sh validate-source-file "$file"
          done
          bundle_name="route-ops-deploy-control.tar.gz"
          s3_key="${DEPLOY_CONTROL_PREFIX}/${GITHUB_RUN_ID}/${IMAGE_TAG}/${bundle_name}"
          s3_uri="s3://${DEPLOY_CONTROL_BUCKET}/${s3_key}"
          staging_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/route-ops-deploy-control.XXXXXX")"
          cleanup() { rm -rf "$staging_dir"; }
          trap cleanup EXIT
          for file in "${deploy_control_files[@]}"; do
            mkdir -p "$staging_dir/$(dirname "$file")"
            cp -p "$file" "$staging_dir/$file"
          done
          python3 - \
            "$IMAGE_TAG" \
            "$PRISMA_SCHEMA_SHA" \
            "$DELIVERY_API_IMAGE" \
            "$DELIVERY_API_MIGRATE_IMAGE" \
            "$ROUTE_ENGINE_IMAGE" \
            "$ROUTE_ENGINE_PUBLISH_EVIDENCE_URL" \
            "$PUBLISH_EVIDENCE_URL" \
            "$DRY_RUN" \
            "$GITHUB_RUN_ID" \
            "$DEPLOY_CONTROL_BUCKET" \
            "$DEPLOY_CONTROL_PREFIX" \
            "$bundle_name" \
            "$s3_uri" \
            "${deploy_control_files[@]}" <<'PY' > "$staging_dir/deploy-control-manifest.json"
          import json
          import sys

          (
              image_tag,
              schema_sha,
              runtime_image,
              migrate_image,
              route_engine_image,
              route_engine_publish_evidence_url,
              publish_evidence_url,
              dry_run,
              github_run_id,
              artifact_bucket,
              artifact_prefix,
              bundle_file,
              s3_uri,
              *deploy_control_files,
          ) = sys.argv[1:]
          print(json.dumps({
              'schemaVersion': 1,
              'dryRun': dry_run == 'true',
              'runId': github_run_id,
              'commitSha': image_tag,
              'imageTag': image_tag,
              'prismaSchemaSha': schema_sha,
              'deliveryApiImage': runtime_image,
              'deliveryApiMigrateImage': migrate_image,
              'routeEngineImage': route_engine_image,
              'routeEnginePublishEvidenceUrl': route_engine_publish_evidence_url,
              'publishEvidenceUrl': publish_evidence_url,
              'artifactBucket': artifact_bucket,
              'artifactPrefix': artifact_prefix,
              'bundleFile': bundle_file,
              's3Uri': s3_uri,
              'deployControlFiles': deploy_control_files,
          }, sort_keys=True, separators=(',', ':')))
          PY
          bundle_path="${RUNNER_TEMP:-/tmp}/route-ops-deploy-control-${GITHUB_RUN_ID}.tar.gz"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -C "$staging_dir" -czf "$bundle_path" deploy-control-manifest.json "${deploy_control_files[@]}"
          scripts/route-ops-deploy-control-bundle.sh validate-tar-manifest "$bundle_path"
          bundle_size="$(wc -c < "$bundle_path" | tr -d ' ')"
          bundle_sha="$(sha256sum "$bundle_path" | awk '{print $1}')"
          python3 - "$s3_uri" "$bundle_sha" <<'PY' > /tmp/route-ops-deploy-parameters.json
          import json
          import sys

          s3_uri, bundle_sha = sys.argv[1:3]
          params = {
              'DeployControlBundleS3Uri': [s3_uri],
              'DeployControlBundleSha256': [bundle_sha],
          }
          for name, values in params.items():
              value = values[0]
              if len(value) > 1024:
                  print(f'{name} is unexpectedly large: {len(value)} chars', file=sys.stderr)
                  sys.exit(1)
          print(json.dumps(params, sort_keys=True))
          PY
          {
            echo "bundle_path=${bundle_path}"
            echo "bundle_sha=${bundle_sha}"
            echo "bundle_size=${bundle_size}"
            echo "s3_uri=${s3_uri}"
            echo "s3_key=${s3_key}"
            echo "selected_bucket=${DEPLOY_CONTROL_BUCKET}"
          } >> "$GITHUB_OUTPUT"
          echo "Route Ops deploy-control artifact selectedBucket=${DEPLOY_CONTROL_BUCKET}"
          echo "Route Ops deploy-control artifact selectedKey=${s3_key}"
          echo "Route Ops deploy-control bundle bytes=${bundle_size}"
          echo "Route Ops deploy-control expectedSha256=${bundle_sha}"
          echo "Route Ops deploy-control ssmParameterChars DeployControlBundleS3Uri=${#s3_uri} DeployControlBundleSha256=${#bundle_sha}"
          echo "Route Ops deploy-control dryRun=${DRY_RUN}"

      - name: Configure AWS credentials through OIDC
        # aws-actions/configure-aws-credentials v6.2.0 (Node 24) pinned to full commit SHA.
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          role-to-assume: ${{ vars.AWS_ROUTE_OPS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve deploy-control artifact bucket
        id: artifact_bucket
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ "$account_id" != "$ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "Route Ops deploy account mismatch: expected ${ROUTE_OPS_EXPECTED_AWS_ACCOUNT_ID}, got ${account_id}." >&2
            exit 1
          fi
          if [ "$AWS_REGION" != "$ROUTE_OPS_EXPECTED_AWS_REGION" ]; then
            echo "Route Ops deploy region mismatch: expected ${ROUTE_OPS_EXPECTED_AWS_REGION}, got ${AWS_REGION}." >&2
            exit 1
          fi
          expected_bucket="route-ops-artifacts-${account_id}-${AWS_REGION}"
          if [ "$ROUTE_OPS_DEPLOY_CONTROL_BUCKET" != "$expected_bucket" ]; then
            echo "Route Ops deploy-control bucket must be ${expected_bucket}; got ${ROUTE_OPS_DEPLOY_CONTROL_BUCKET}." >&2
            exit 1
          fi
          if [ "$ROUTE_OPS_DEPLOY_CONTROL_PREFIX" != "artifacts/route-ops/prod/deploy-control" ]; then
            echo "Route Ops deploy-control prefix must be artifacts/route-ops/prod/deploy-control." >&2
            exit 1
          fi
          echo "bucket=${ROUTE_OPS_DEPLOY_CONTROL_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "prefix=${ROUTE_OPS_DEPLOY_CONTROL_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "Route Ops deploy-control artifact bucket selected: ${ROUTE_OPS_DEPLOY_CONTROL_BUCKET}"
          echo "Route Ops deploy-control artifact prefix selected: ${ROUTE_OPS_DEPLOY_CONTROL_PREFIX}"

      - name: Upload deploy-control bundle artifact
        shell: bash
        env:
          DEPLOY_CONTROL_BUCKET: ${{ steps.artifact_bucket.outputs.bucket }}
          DEPLOY_CONTROL_PREFIX: ${{ steps.artifact_bucket.outputs.prefix }}
          BUNDLE_PATH: ${{ steps.source_sync.outputs.bundle_path }}
          BUNDLE_SHA: ${{ steps.source_sync.outputs.bundle_sha }}
          BUNDLE_SIZE: ${{ steps.source_sync.outputs.bundle_size }}
          S3_URI: ${{ steps.source_sync.outputs.s3_uri }}
          S3_KEY: ${{ steps.source_sync.outputs.s3_key }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ ! -f "$BUNDLE_PATH" ]; then
            echo "Route Ops deploy-control bundle is missing before S3 upload: $BUNDLE_PATH" >&2
            exit 1
          fi
          actual_sha="$(sha256sum "$BUNDLE_PATH" | awk '{print $1}')"
          actual_size="$(wc -c < "$BUNDLE_PATH" | tr -d ' ')"
          if [ "$actual_sha" != "$BUNDLE_SHA" ]; then
            echo "Route Ops deploy-control bundle SHA256 changed before upload." >&2
            exit 1
          fi
          if [ "$actual_size" != "$BUNDLE_SIZE" ]; then
            echo "Route Ops deploy-control bundle size changed before upload." >&2
            exit 1
          fi
          case "$S3_URI" in
            "s3://${DEPLOY_CONTROL_BUCKET}/${DEPLOY_CONTROL_PREFIX}/"*) ;;
            *) echo "Route Ops deploy-control S3 URI is outside selected bucket/prefix: $S3_URI" >&2; exit 1 ;;
          esac
          aws s3 cp "$BUNDLE_PATH" "$S3_URI" --sse AES256 --no-progress
          echo "Route Ops deploy-control artifact selectedBucket=${DEPLOY_CONTROL_BUCKET}"
          echo "Route Ops deploy-control artifact selectedKey=${S3_KEY}"
          echo "Route Ops deploy-control bundle bytes=${BUNDLE_SIZE}"
          echo "Route Ops deploy-control expectedSha256=${BUNDLE_SHA}"
          echo "Route Ops deploy-control actualSha256=${actual_sha}"
          echo "Route Ops deploy-control dryRun=${DRY_RUN}"

      - name: Verify SSM target resolves to one online managed node
        id: target
        shell: bash
        env:
          SSM_ROUTE_OPS_TARGET_TAG_KEY: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_KEY }}
          SSM_ROUTE_OPS_TARGET_TAG_VALUE: ${{ vars.SSM_ROUTE_OPS_TARGET_TAG_VALUE }}
        run: |
          set -euo pipefail
          filter="Key=tag:${SSM_ROUTE_OPS_TARGET_TAG_KEY},Values=${SSM_ROUTE_OPS_TARGET_TAG_VALUE}"
          target_query="[length(InstanceInformationList), InstanceInformationList[0].InstanceId, InstanceInformationList[0].PingStatus, InstanceInformationList[0].AgentVersion]"
          read -r total_count instance_id ping_status agent_version <<< "$(aws ssm describe-instance-information --filters "$filter" --query "$target_query" --output text)"
          if [ "$total_count" != "1" ]; then
            echo "Route Ops SSM target tag must resolve to exactly one managed node; got $total_count." >&2
            exit 1
          fi
          if [ -z "$instance_id" ] || [ "$instance_id" = "None" ]; then
            echo "Unable to resolve Route Ops SSM target instance id." >&2
            exit 1
          fi
          if [ "$ping_status" != "Online" ]; then
            echo "Route Ops SSM target must be Online; got $ping_status for $instance_id." >&2
            exit 1
          fi
          python3 - "$agent_version" <<'PY'
          import sys

          version = sys.argv[1]
          minimum = (3, 3, 2746, 0)
          try:
              parsed = tuple(int(part) for part in version.split('.'))
          except ValueError:
              print(f'Unable to parse SSM AgentVersion: {version}', file=sys.stderr)
              sys.exit(1)
          parsed = parsed + (0,) * (len(minimum) - len(parsed))
          if parsed < minimum:
              print(f'SSM AgentVersion {version} must be >= 3.3.2746.0 for ENV_VAR interpolation.', file=sys.stderr)
              sys.exit(1)
          PY
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "Resolved exactly one online Route Ops managed node."

      - name: Reconcile Route Ops Caddy ingress
        if: inputs.dry_run == 'false' && vars.ROUTE_OPS_RECONCILE_INGRESS_WITH_AWS_RUNSHELLSCRIPT == 'true'
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          cat > /tmp/route-ops-ingress-reconcile.json <<'JSON'
          {
            "commands": [
              "set -eu",
              "cd /srv/clever-route-server",
              "export ROUTE_OPS_COMPOSE_PROJECT_NAME=clever-route",
              "export COMPOSE_PROJECT_NAME=$ROUTE_OPS_COMPOSE_PROJECT_NAME",
              "test -f infra/caddy/Caddyfile",
              "test -f infra/compose/docker-compose.prod.yml",
              "test -f .deploy/current-image.env",
              "docker compose -p \"$ROUTE_OPS_COMPOSE_PROJECT_NAME\" --env-file .deploy/current-image.env -f infra/compose/docker-compose.prod.yml config --quiet",
              "docker compose -p \"$ROUTE_OPS_COMPOSE_PROJECT_NAME\" --env-file .deploy/current-image.env -f infra/compose/docker-compose.prod.yml up -d --no-build --force-recreate --no-deps caddy",
              "docker compose -p \"$ROUTE_OPS_COMPOSE_PROJECT_NAME\" --env-file .deploy/current-image.env -f infra/compose/docker-compose.prod.yml ps caddy"
            ]
          }
          JSON
          read -r command_id target_count <<< "$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --parameters file:///tmp/route-ops-ingress-reconcile.json \
            --max-concurrency "1" \
            --max-errors "0" \
            --comment "Route Ops ingress reconcile from GitHub Actions run ${GITHUB_RUN_ID}" \
            --query 'Command.[CommandId,TargetCount]' \
            --output text)"
          if [ "$target_count" != "1" ]; then
            echo "Route Ops ingress reconcile TargetCount must be 1; got $target_count." >&2
            exit 1
          fi
          terminal='^(Success|Cancelled|TimedOut|Failed|Cancelling)$'
          status="Pending"
          for _ in {1..24}; do
            status="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)"
            if [[ "$status" =~ $terminal ]]; then break; fi
            sleep 5
          done
          summary="$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json)"
          SUMMARY_JSON="$summary" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ['SUMMARY_JSON'])
          for key in ('StandardOutputContent', 'StandardErrorContent'):
              value = str(data.get(key) or '')
              if len(value) > 4000:
                  value = value[:4000] + '\n...<truncated>...'
              data[key] = value
          print(json.dumps(data, indent=2))
          PY
          if [ "$status" != "Success" ]; then
            echo "Route Ops ingress reconcile command did not succeed: $status" >&2
            exit 1
          fi

      - name: Send custom SSM deploy command
        id: command
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PRISMA_SCHEMA_SHA: ${{ inputs.prisma_schema_sha }}
          DELIVERY_API_IMAGE: ${{ inputs.delivery_api_image }}
          DELIVERY_API_MIGRATE_IMAGE: ${{ inputs.delivery_api_migrate_image }}
          PUBLISH_EVIDENCE_URL: ${{ inputs.publish_evidence_url }}
          DRY_RUN: ${{ inputs.dry_run }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          SSM_ROUTE_OPS_DOCUMENT_NAME: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_NAME }}
          SSM_ROUTE_OPS_DOCUMENT_VERSION: ${{ vars.SSM_ROUTE_OPS_DOCUMENT_VERSION }}
        run: |
          set -euo pipefail
          test -f /tmp/route-ops-deploy-parameters.json
          send_query="Command.[CommandId,TargetCount]"
          read -r command_id target_count <<< "$(aws ssm send-command \
            --document-name "$SSM_ROUTE_OPS_DOCUMENT_NAME" \
            --document-version "$SSM_ROUTE_OPS_DOCUMENT_VERSION" \
            --instance-ids "$INSTANCE_ID" \
            --parameters file:///tmp/route-ops-deploy-parameters.json \
            --max-concurrency "1" \
            --max-errors "0" \
            --comment "RouteOps ${IMAGE_TAG:0:12} dryRun=${DRY_RUN} run ${GITHUB_RUN_ID}" \
            --query "$send_query" \
            --output text)"
          if [ "$target_count" != "1" ]; then
            echo "Route Ops SSM SendCommand TargetCount must be 1; got $target_count." >&2
            exit 1
          fi
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "SSM command submitted: ${command_id}"

      - name: Poll SSM deploy command status
        shell: bash
        env:
          COMMAND_ID: ${{ steps.command.outputs.command_id }}
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
        run: |
          set -euo pipefail
          terminal='^(Success|Cancelled|TimedOut|Failed|Cancelling)$'
          status="Pending"
          for _ in {1..720}; do
            status="$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)"
            if [[ "$status" =~ $terminal ]]; then break; fi
            sleep 10
          done
          summary="$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json)"
          SUMMARY_JSON="$summary" python3 - <<'PY'
          import json
          import os
          import re

          data = json.loads(os.environ['SUMMARY_JSON'])
          for key in ('StandardOutputContent', 'StandardErrorContent'):
              value = str(data.get(key) or '')
              value = re.sub(r'clever_admin_ui=[^;\s]+', 'clever_admin_ui=<redacted>', value)
              if len(value) > 6000:
                  value = value[:6000] + '\n...<truncated>...'
              data[key] = value
          print(json.dumps(data, indent=2))
          PY
          if [ "$status" != "Success" ]; then
            echo "Route Ops SSM deploy command did not succeed: $status" >&2
            exit 1
          fi
