services:
  wordpress:
    image: wordpress:6.8-php8.3-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_USER: wordpress
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
      WORDPRESS_DEBUG: "1"
    ports:
      - "8088:80"
    volumes:
      - wordpress_data:/var/www/html

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: wordpress-root
      MARIADB_USER: wordpress
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

  wp-cli:
    image: wordpress:cli-2.11.0-php8.3
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_USER: wordpress
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
    user: "33:33"
    volumes:
      - wordpress_data:/var/www/html
      - ./seed-orders.example.json:/tmp/seed-orders.example.json:ro
      - ./scripts:/tmp/clever-scripts:ro
    entrypoint: ["wp"]

volumes:
  db_data:
  wordpress_data:
